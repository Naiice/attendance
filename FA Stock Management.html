<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FA Stock Management</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- ตั้งค่า Tailwind สำหรับหน้าจอขนาดใหญ่ (TV) -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          screens: {
            'tv': '1920px', // หน้าจอระดับ Full HD ขึ้นไป หรือทีวีขนาดใหญ่
          }
        }
      }
    }
  </script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React & ReactDOM (CDN) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel สำหรับให้เบราว์เซอร์อ่าน JSX ได้ -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ปรับแต่ง Scrollbar ให้ดูสะอาดตาบนทุกอุปกรณ์ */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <!-- จุดที่ React จะไปแสดงผล -->
  <div id="root"></div>

  <!-- โค้ด Application -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 🔴 URL ของ Google Apps Script ที่ Deploy ไว้แล้ว
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxeuvLdQinVWwPwUSDZkX7_aHIU9_nbsKWREJ3yw32vyUpyaZ_PZSYlVl-s4tAN0SY/exec'; 

    const getDirectImageUrl = (url) => {
      if (!url) return null;
      let id = '';
      
      const matchFileD = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
      const matchId = url.match(/id=([a-zA-Z0-9_-]+)/);
      
      if (matchFileD && matchFileD[1]) {
        id = matchFileD[1];
      } else if (matchId && matchId[1]) {
        id = matchId[1];
      }

      if (id) {
        return `https://drive.google.com/thumbnail?id=${id}&sz=w400`; // เพิ่มความละเอียดเพื่อจอใหญ่
      }
      return url;
    };

    function StockManagementApp() {
      const [inventory, setInventory] = useState([]);
      const [filteredInventory, setFilteredInventory] = useState([]);
      const [searchTerm, setSearchTerm] = useState('');
      const [isLoading, setIsLoading] = useState(true);
      const [statusMessage, setStatusMessage] = useState({ type: '', text: '' });
      
      const [modalState, setModalState] = useState({
        isOpen: false,
        type: 'IN', 
        itemCode: '',
        qty: 1,
        person: ''
      });
      
      const scannerInputRef = useRef(null);
      const [scannerCode, setScannerCode] = useState('');

      const fetchStockData = async () => {
        setIsLoading(true);
        try {
          const response = await fetch(`${SCRIPT_URL}?action=getStockData`);
          if (!response.ok) throw new Error('Network error or CORS issue');
          
          const data = await response.json();
          if (data.error) throw new Error(data.error);
          
          setInventory(data);
          setFilteredInventory(data);
          setStatusMessage({ type: 'success', text: 'อัปเดตข้อมูลล่าสุดสำเร็จ' });
          setTimeout(() => setStatusMessage({ type: '', text: '' }), 3000);
        } catch (error) {
          console.error('Error fetching stock:', error);
          setStatusMessage({ type: 'error', text: 'การเชื่อมต่อล้มเหลว: โปรดตรวจสอบ SCRIPT_URL' });
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        fetchStockData();
      }, []);

      useEffect(() => {
        const results = inventory.filter(item => 
          (item.id && item.id.toLowerCase().includes(searchTerm.toLowerCase())) || 
          (item.name && item.name.toLowerCase().includes(searchTerm.toLowerCase())) ||
          (item.barcode && item.barcode.toLowerCase().includes(searchTerm.toLowerCase()))
        );
        setFilteredInventory(results);
      }, [searchTerm, inventory]);

      const handleScanSubmit = (e) => {
        e.preventDefault();
        if (!scannerCode) return;

        const foundItem = inventory.find(item => 
          (item.barcode && item.barcode === scannerCode) || 
          (item.id && item.id === scannerCode)
        );
        
        if (foundItem) {
          setModalState({
            isOpen: true,
            type: 'OUT',
            itemCode: foundItem.id, 
            qty: 1,
            person: ''
          });
        } else {
          setStatusMessage({ type: 'error', text: `ไม่พบรหัสสินค้าหรือบาร์โค้ด: ${scannerCode}` });
          setTimeout(() => setStatusMessage({ type: '', text: '' }), 3000);
        }
        setScannerCode('');
      };

      const handleTransactionSubmit = async (e) => {
        e.preventDefault();
        if (!modalState.person.trim()) {
          alert("กรุณากรอกชื่อผู้รับผิดชอบ");
          return;
        }

        setIsLoading(true);
        setModalState({ ...modalState, isOpen: false }); 

        const payload = {
          action: 'updateStock',
          itemCode: modalState.itemCode,
          type: modalState.type,
          qty: modalState.qty,
          person: modalState.person
        };

        try {
          const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          });
          
          const result = await response.json();
          
          if (result.status === 'success') {
            setStatusMessage({ type: 'success', text: result.message });
            fetchStockData(); 
          } else {
            setStatusMessage({ type: 'error', text: result.message });
          }
        } catch (error) {
          console.error('Transaction Error:', error);
          setStatusMessage({ type: 'error', text: 'เกิดข้อผิดพลาดในการเชื่อมต่อ' });
        } finally {
          setIsLoading(false);
          setTimeout(() => setStatusMessage({ type: '', text: '' }), 4000);
          if(scannerInputRef.current) scannerInputRef.current.focus();
        }
      };

      const lowStockItems = inventory.filter(item => item.qty < item.safetyStock);

      return (
        // ขยายคอนเทนเนอร์ให้เต็มจอมากขึ้นเมื่อเป็นทีวี
        <div className="min-h-screen bg-slate-50 p-2 sm:p-4 md:p-8 tv:p-12 font-sans transition-all duration-300">
          <div className="max-w-full md:max-w-7xl tv:max-w-[95%] mx-auto space-y-4 md:space-y-6 tv:space-y-10">
            
            {/* Header */}
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-4 md:p-6 tv:p-10 rounded-xl shadow-sm border border-slate-100 gap-4">
              <div>
                <h1 className="text-xl sm:text-2xl md:text-3xl tv:text-5xl font-bold text-slate-800 flex items-center gap-2 tv:gap-4">
                  <i className="fas fa-boxes text-blue-600"></i> FA-Stock Management
                </h1>
                <p className="text-sm sm:text-base tv:text-2xl text-slate-500 mt-1 tv:mt-3">ระบบจัดการสต็อกคงคลังอัจฉริยะ</p>
              </div>
              <button 
                onClick={fetchStockData}
                disabled={isLoading}
                className="w-full md:w-auto px-4 py-2 tv:px-8 tv:py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm md:text-base tv:text-2xl rounded-lg flex justify-center items-center gap-2 transition-colors disabled:opacity-50"
              >
                <i className={`fas fa-sync-alt ${isLoading ? "fa-spin" : ""}`}></i>
                รีเฟรชข้อมูล
              </button>
            </div>

            {/* Status Messages */}
            {statusMessage.text && (
              <div className={`p-4 tv:p-6 rounded-lg flex items-center gap-3 tv:gap-5 ${statusMessage.type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`}>
                {statusMessage.type === 'error' ? <i className="fas fa-exclamation-triangle text-xl tv:text-3xl"></i> : <i className="fas fa-check-circle text-xl tv:text-3xl"></i>}
                <span className="font-medium text-sm md:text-base tv:text-2xl">{statusMessage.text}</span>
              </div>
            )}

            <div className="grid grid-cols-1 lg:grid-cols-3 tv:grid-cols-4 gap-4 md:gap-6 tv:gap-10">
              
              {/* ซ้าย: เครื่องมือ & การแจ้งเตือน */}
              <div className="space-y-4 md:space-y-6 tv:space-y-10 tv:col-span-1">
                
                {/* กล่องสแกนเนอร์ */}
                <div className="bg-white p-4 md:p-6 tv:p-8 rounded-xl shadow-sm border border-slate-100">
                  <h2 className="text-base md:text-lg tv:text-3xl font-bold text-slate-800 mb-3 md:mb-4 tv:mb-6 flex items-center gap-2 tv:gap-4">
                    <i className="fas fa-barcode"></i> สแกนบาร์โค้ด
                  </h2>
                  <form onSubmit={handleScanSubmit}>
                    <div className="relative">
                      <input
                        ref={scannerInputRef}
                        type="text"
                        placeholder="สแกน หรือ พิมพ์รหัส..."
                        className="w-full pl-10 tv:pl-16 pr-4 py-3 tv:py-5 border-2 border-blue-100 rounded-lg focus:border-blue-500 focus:ring-0 outline-none transition-all text-slate-700 font-medium text-sm md:text-base tv:text-2xl"
                        value={scannerCode}
                        onChange={(e) => setScannerCode(e.target.value)}
                        autoFocus
                      />
                      <i className="fas fa-barcode absolute left-3 tv:left-5 top-3.5 tv:top-5 text-slate-400 tv:text-3xl"></i>
                    </div>
                    <p className="text-xs tv:text-xl text-slate-400 mt-2 tv:mt-4 text-center">เสียบเครื่องสแกนบาร์โค้ดและยิงเข้าที่ช่องนี้ได้เลย</p>
                  </form>
                </div>

                {/* แจ้งเตือน Safety Stock */}
                <div className="bg-white p-4 md:p-6 tv:p-8 rounded-xl shadow-sm border border-red-100">
                  <h2 className="text-base md:text-lg tv:text-3xl font-bold text-red-600 mb-3 md:mb-4 tv:mb-6 flex items-center gap-2 tv:gap-4">
                    <i className="fas fa-exclamation-triangle"></i> สินค้าใกล้หมด ({lowStockItems.length})
                  </h2>
                  {lowStockItems.length > 0 ? (
                    <div className="space-y-2 md:space-y-3 tv:space-y-5 max-h-[40vh] md:max-h-64 tv:max-h-[500px] overflow-y-auto pr-2">
                      {lowStockItems.map(item => (
                        <div key={item.id} className="bg-red-50 p-3 tv:p-5 rounded-lg border border-red-100 flex justify-between items-center">
                          <div className="min-w-0 pr-2">
                            <div className="font-bold text-slate-800 text-sm tv:text-2xl truncate">{item.name}</div>
                            <div className="text-xs tv:text-xl text-slate-500 truncate">รหัส: {item.id}</div>
                          </div>
                          <div className="text-right shrink-0">
                            <div className="text-red-600 font-bold text-lg tv:text-4xl">{item.qty}</div>
                            <div className="text-xs tv:text-xl text-slate-500">ขั้นต่ำ: {item.safetyStock}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className="text-center py-6 tv:py-10 text-slate-400 flex flex-col items-center">
                      <i className="fas fa-check-circle text-4xl tv:text-6xl mb-2 tv:mb-4 text-green-400"></i>
                      <p className="text-sm tv:text-2xl">สินค้าคงคลังอยู่ในเกณฑ์ปกติทั้งหมด</p>
                    </div>
                  )}
                </div>
              </div>

              {/* ขวา: ตารางสต็อก */}
              <div className="lg:col-span-2 tv:col-span-3 bg-white p-4 md:p-6 tv:p-8 rounded-xl shadow-sm border border-slate-100 flex flex-col h-full">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 md:mb-6 tv:mb-10 gap-3">
                  <h2 className="text-lg md:text-xl tv:text-4xl font-bold text-slate-800">รายการสินค้าทั้งหมด</h2>
                  
                  <div className="relative w-full sm:w-64 tv:w-96">
                    <i className="fas fa-search absolute left-3 tv:left-5 top-3 tv:top-4 text-slate-400 tv:text-2xl"></i>
                    <input
                      type="text"
                      placeholder="ค้นหารหัส หรือ ชื่อสินค้า..."
                      className="w-full pl-9 tv:pl-14 pr-4 py-2 tv:py-4 border border-slate-200 rounded-lg focus:border-blue-500 outline-none text-sm tv:text-2xl"
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                    />
                  </div>
                </div>

                <div className="overflow-x-auto flex-1">
                  <table className="w-full text-left border-collapse min-w-[600px]">
                    <thead>
                      <tr className="bg-slate-50 text-slate-500 text-xs md:text-sm tv:text-2xl border-y border-slate-200">
                        <th className="p-2 md:p-3 tv:p-6 font-medium w-32 tv:w-48">รหัส / บาร์โค้ด</th>
                        <th className="p-2 md:p-3 tv:p-6 font-medium">ชื่อสินค้า</th>
                        <th className="p-2 md:p-3 tv:p-6 font-medium text-center w-20 tv:w-36">รูปภาพ</th>
                        <th className="p-2 md:p-3 tv:p-6 font-medium text-center w-28 tv:w-48">คงเหลือ</th>
                        <th className="p-2 md:p-3 tv:p-6 font-medium text-center w-28 tv:w-48">จัดการ</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {isLoading && inventory.length === 0 ? (
                        <tr><td colSpan="5" className="text-center py-10 tv:py-20 text-slate-400 tv:text-2xl">กำลังโหลดข้อมูล...</td></tr>
                      ) : filteredInventory.length === 0 ? (
                        <tr><td colSpan="5" className="text-center py-10 tv:py-20 text-slate-400 tv:text-2xl">ไม่พบสินค้าที่ค้นหา</td></tr>
                      ) : (
                        filteredInventory.map(item => (
                          <tr key={item.id} className="hover:bg-slate-50 transition-colors group">
                            <td className="p-2 md:p-3 tv:p-6 text-slate-600 font-mono text-xs md:text-sm tv:text-2xl align-middle">
                              <div className="font-bold text-slate-800">{item.id}</div>
                              {item.barcode && <div className="text-[10px] md:text-xs tv:text-xl text-slate-400 mt-0.5">บาร์โค้ด: {item.barcode}</div>}
                            </td>
                            <td className="p-2 md:p-3 tv:p-6 font-medium text-slate-800 align-middle">
                              <div className="text-sm tv:text-3xl">{item.name}</div>
                              {item.nameChina && <div className="text-xs tv:text-xl text-slate-500 font-normal mt-0.5">{item.nameChina}</div>}
                            </td>
                            <td className="p-2 md:p-3 tv:p-6 align-middle">
                              <div className="flex justify-center">
                                {getDirectImageUrl(item.picUrl) ? (
                                  <img 
                                    src={getDirectImageUrl(item.picUrl)} 
                                    alt={item.name} 
                                    className="w-10 h-10 md:w-12 md:h-12 tv:w-24 tv:h-24 object-cover rounded-md border border-slate-200 bg-white" 
                                    onError={(e) => { 
                                      e.target.onerror = null; 
                                      e.target.src = 'https://placehold.co/100x100/f8fafc/94a3b8?text=No+Img'; 
                                    }} 
                                  />
                                ) : (
                                  <div className="w-10 h-10 md:w-12 md:h-12 tv:w-24 tv:h-24 bg-slate-100 rounded-md flex items-center justify-center text-slate-400 border border-slate-200">
                                     <i className="fas fa-image text-lg tv:text-3xl"></i>
                                  </div>
                                )}
                              </div>
                            </td>
                            <td className="p-2 md:p-3 tv:p-6 text-center align-middle">
                              <span className={`inline-flex items-baseline px-2 py-1 md:px-3 md:py-1 tv:px-5 tv:py-2 rounded-full text-xs md:text-sm tv:text-2xl font-bold ${
                                item.qty < item.safetyStock ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'
                              }`}>
                                {item.qty} <span className="text-[10px] md:text-xs tv:text-lg font-normal opacity-80 ml-1">{item.unit}</span>
                              </span>
                            </td>
                            <td className="p-2 md:p-3 tv:p-6 align-middle">
                              <div className="flex justify-center gap-1.5 md:gap-2 tv:gap-4">
                                <button 
                                  onClick={() => setModalState({ isOpen: true, type: 'IN', itemCode: item.id, qty: 1, person: '' })}
                                  className="w-8 h-8 md:w-9 md:h-9 tv:w-16 tv:h-16 flex items-center justify-center bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-md transition-colors"
                                  title="เติมสต็อก"
                                >
                                  <i className="fas fa-cart-plus text-sm md:text-base tv:text-3xl"></i>
                                </button>
                                <button 
                                  onClick={() => setModalState({ isOpen: true, type: 'OUT', itemCode: item.id, qty: 1, person: '' })}
                                  className="w-8 h-8 md:w-9 md:h-9 tv:w-16 tv:h-16 flex items-center justify-center bg-amber-50 hover:bg-amber-100 text-amber-600 rounded-md transition-colors"
                                  title="เบิกจ่าย"
                                >
                                  <i className="fas fa-dolly text-sm md:text-base tv:text-3xl"></i>
                                </button>
                              </div>
                            </td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>

          {/* Modal เติม/เบิก สินค้า */}
          {modalState.isOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-2xl w-full max-w-[95%] sm:max-w-md tv:max-w-2xl overflow-hidden shadow-2xl animate-in fade-in zoom-in duration-200">
                <div className={`p-4 tv:p-6 flex justify-between items-center text-white ${modalState.type === 'IN' ? 'bg-blue-600' : 'bg-amber-500'}`}>
                  <h3 className="font-bold text-lg tv:text-3xl flex items-center gap-2 tv:gap-4">
                    {modalState.type === 'IN' ? <i className="fas fa-cart-plus"></i> : <i className="fas fa-dolly"></i>}
                    {modalState.type === 'IN' ? 'ทำรายการ: เติมสต็อก (IN)' : 'ทำรายการ: เบิกจ่าย (OUT)'}
                  </h3>
                  <button onClick={() => setModalState({...modalState, isOpen: false})} className="text-white/80 hover:text-white">
                    <i className="fas fa-times text-xl tv:text-4xl"></i>
                  </button>
                </div>
                
                <form onSubmit={handleTransactionSubmit} className="p-5 md:p-6 tv:p-10 space-y-4 tv:space-y-8">
                  <div>
                    <label className="block text-sm tv:text-2xl font-medium text-slate-700 mb-1 tv:mb-3">รหัสสินค้า</label>
                    <input 
                      type="text" 
                      value={modalState.itemCode} 
                      disabled
                      className="w-full p-2.5 tv:p-4 bg-slate-100 border border-slate-200 rounded-lg text-slate-600 font-mono text-sm tv:text-2xl"
                    />
                    <div className="text-sm tv:text-2xl font-bold text-slate-800 mt-1 tv:mt-3">
                      {inventory.find(i => i.id === modalState.itemCode)?.name}
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm tv:text-2xl font-medium text-slate-700 mb-1 tv:mb-3">จำนวนที่{modalState.type === 'IN' ? 'เติม' : 'เบิก'}</label>
                    <input 
                      type="number" 
                      min="1"
                      required
                      value={modalState.qty}
                      onChange={(e) => setModalState({...modalState, qty: e.target.value})}
                      className="w-full p-2.5 tv:p-4 border border-slate-300 rounded-lg focus:border-blue-500 outline-none text-lg tv:text-3xl font-bold"
                    />
                  </div>

                  <div>
                    <label className="block text-sm tv:text-2xl font-medium text-slate-700 mb-1 tv:mb-3 text-red-600">ชื่อผู้รับผิดชอบ / ผู้เบิก (บังคับ)*</label>
                    <input 
                      type="text" 
                      required
                      placeholder="ระบุชื่อพนักงาน"
                      value={modalState.person}
                      onChange={(e) => setModalState({...modalState, person: e.target.value})}
                      className="w-full p-2.5 tv:p-4 border-2 border-slate-300 focus:border-red-500 rounded-lg outline-none text-base tv:text-2xl" 
                      autoFocus
                    />
                  </div>

                  <div className="pt-4 tv:pt-6 flex gap-3 tv:gap-6">
                    <button 
                      type="button"
                      onClick={() => setModalState({...modalState, isOpen: false})}
                      className="flex-1 py-2.5 tv:py-5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-medium transition-colors text-sm tv:text-2xl"
                    >
                      ยกเลิก
                    </button>
                    <button 
                      type="submit"
                      className={`flex-1 py-2.5 tv:py-5 text-white rounded-lg font-medium transition-colors text-sm tv:text-2xl ${modalState.type === 'IN' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-amber-500 hover:bg-amber-600'}`}
                    >
                      ยืนยันบันทึก
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<StockManagementApp />);
  </script>
</body>
</html>
