<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FA Stock Management</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          screens: {
            'tv': '1920px', 
          }
        }
      }
    }
  </script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>
  
  <!-- เพิ่ม Library Recharts และ Dependencies สำหรับสร้างกราฟ -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.1.9/umd/Recharts.js"></script>

  <style>
    /* ปรับแต่ง Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 🔴 URL Apps Script
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxeuvLdQinVWwPwUSDZkX7_aHIU9_nbsKWREJ3yw32vyUpyaZ_PZSYlVl-s4tAN0SY/exec'; 

    // ดึง Components ของ Recharts มาใช้งาน (เพิ่ม PieChart)
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } = window.Recharts;

    // 🟢 ลิงก์ Publish to web (CSV) ของชีต Stock
    const CSV_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQguGoF3kiHKMbAW_IHJaxIO0cAr4-6CktfRLZRYhf4z2WvVC_zmiZp6AH8hLpX_aNZNWpJuWfiBcYc/pub?gid=2049777622&single=true&output=csv`;
    
    // 🟡 ลิงก์ Export CSV ของชีต "FA Stock History" ที่คุณให้มา
    const HISTORY_CSV_URL = `https://docs.google.com/spreadsheets/d/1R3-R-HsrfGBt1L2wMFrsIBZnCz20YNRhVTWnb4Ygxto/export?format=csv&gid=500249857`;

    const fetchWithFallback = async (url) => {
        const proxyList = [
            url, 
            `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, 
            `https://corsproxy.io/?${encodeURIComponent(url)}` 
        ];

        let lastError;
        for (let i = 0; i < proxyList.length; i++) {
            try {
                const response = await fetch(proxyList[i]);
                const text = await response.text();
                if (text.includes("<!DOCTYPE html>")) throw new Error("Google Sheet requires login");
                return text;
            } catch (error) {
                lastError = error;
            }
        }
        throw lastError || new Error("Failed to fetch data from all sources");
    };

    const getDirectImageUrl = (url) => {
      if (!url) return null;
      let id = '';
      const matchFileD = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
      const matchId = url.match(/id=([a-zA-Z0-9_-]+)/);
      const matchUc = url.match(/uc\?.*id=([a-zA-Z0-9_-]+)/);
      
      if (matchFileD && matchFileD[1]) {
        id = matchFileD[1];
      } else if (matchId && matchId[1]) {
        id = matchId[1];
      } else if (matchUc && matchUc[1]) {
        id = matchUc[1];
      }

      // ใส่ $ เพื่อแทรกตัวแปร id ได้ถูกต้อง
      if (id) {
        return `https://lh3.googleusercontent.com/d/${id}`; 
      }
      return url;
    };

    function StockManagementApp() {
      const [inventory, setInventory] = useState([]);
      const [filteredInventory, setFilteredInventory] = useState([]);
      
      // เพิ่ม State สำหรับ Dashboard ใหม่แบบ Professional
      const [dashStats, setDashStats] = useState({ totalIn: 0, totalOut: 0, totalInv: 0, statusCount: [] });
      const [lineStats, setLineStats] = useState([]);
      const [personInStats, setPersonInStats] = useState([]);
      const [personOutStats, setPersonOutStats] = useState([]);
      const [recentHistory, setRecentHistory] = useState([]);
      
      const [searchTerm, setSearchTerm] = useState('');
      const [isLoading, setIsLoading] = useState(true);
      const [statusMessage, setStatusMessage] = useState({ type: '', text: '' });
      const [activeTab, setActiveTab] = useState('inventory');
      const [scannerCode, setScannerCode] = useState('');

      const scannerInputRef = useRef(null);
      const [modalState, setModalState] = useState({
        isOpen: false,
        type: 'IN',
        itemCode: '',
        qty: 1,
        person: '',
        line: '',
        isAuthorized: false,
        passwordInput: ''
      });

      const fetchStockData = async () => {
        setIsLoading(true);
        try {
          const csvText = await fetchWithFallback(CSV_URL);
          const rows = csvText.replace(/\r/g, '').split('\n').filter(r => r.trim());
          
          if(rows.length < 2) throw new Error("ไม่พบข้อมูลในชีต");

          const headers = rows[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/"/g, '').toLowerCase());
          
          const idIdx = headers.findIndex(h => h === 'product code');
          const nameIdx = headers.findIndex(h => h === 'name - thai');
          const nameChinaIdx = headers.findIndex(h => h === 'name - china');
          const barcodeIdx = headers.findIndex(h => h === 'barcode');
          const qtyIdx = headers.findIndex(h => h === 'in-stock');
          const safetyIdx = headers.findIndex(h => h === 'safety stock');
          const unitIdx = headers.findIndex(h => h === 'unit');
          const picIdx = headers.findIndex(h => h === 'picture url');
          const statusIdx = headers.findIndex(h => h === 'status');

          const parsedData = rows.slice(1).map(row => {
              const cells = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/"/g, ''));
              return {
                  id: idIdx !== -1 ? cells[idIdx] : '',
                  name: nameIdx !== -1 ? cells[nameIdx] : '',
                  nameChina: nameChinaIdx !== -1 ? cells[nameChinaIdx] : '',
                  barcode: barcodeIdx !== -1 ? cells[barcodeIdx] : '',
                  qty: qtyIdx !== -1 ? (parseInt(cells[qtyIdx], 10) || 0) : 0,
                  safetyStock: safetyIdx !== -1 ? (parseInt(cells[safetyIdx], 10) || 0) : 0,
                  unit: unitIdx !== -1 ? cells[unitIdx] : '',
                  picUrl: picIdx !== -1 ? cells[picIdx] : '',
                  status: statusIdx !== -1 ? cells[statusIdx] : '' 
              };
          }).filter(item => item.id !== '');
          
          // คำนวณ KPI ภาพรวมสินค้าคงคลัง
          const totalInv = parsedData.reduce((sum, item) => sum + item.qty, 0);
          const sCount = {};
          parsedData.forEach(item => {
             const s = item.status && item.status.trim() !== '' ? item.status : 'Normal';
             sCount[s] = (sCount[s] || 0) + 1;
          });
          const statusArray = Object.entries(sCount).map(([name, value]) => ({name, value})).sort((a,b)=>b.value-a.value);
          setDashStats(prev => ({ ...prev, totalInv, statusCount: statusArray }));

          setInventory(parsedData);
          setFilteredInventory(parsedData);
          setStatusMessage({ type: 'success', text: 'อัปเดตข้อมูลล่าสุดสำเร็จ' });
          setTimeout(() => setStatusMessage({ type: '', text: '' }), 3000);
        } catch (error) {
          console.error('Error fetching stock:', error);
          setStatusMessage({ type: 'error', text: 'การเชื่อมต่อล้มเหลว: ' + error.message });
        } finally {
          setIsLoading(false);
        }
      };

      const fetchHistoryData = async () => {
        if (HISTORY_CSV_URL === 'ใส่ลิงก์_CSV_ของชีท_History_ที่นี่') return;
        
        try {
          const csvText = await fetchWithFallback(HISTORY_CSV_URL);
          const rows = csvText.replace(/\r/g, '').split('\n').filter(r => r.trim());
          if(rows.length < 2) return;

          const headers = rows[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/"/g, '').toLowerCase());
          
          const lineIdx = headers.findIndex(h => h === 'line' || h.includes('line'));
          const statusIdx = headers.findIndex(h => h === 'status' || h.includes('status')); 
          const qtyIdx = headers.findIndex(h => h === "q'ty" || h === 'qty' || h === 'quantity');
          const itemNameIdx = headers.findIndex(h => h === 'name - thai' || h === 'item name' || h === 'รายการ'); 
          const personIdx = headers.findIndex(h => h === 'name' || h === 'ผู้เบิก' || h === 'ชื่อ');
          const dateIdx = headers.findIndex(h => h === 'timestamp' || h === 'date' || h === 'วันที่');

          const lineMap = {};
          const pInMap = {};
          const pOutMap = {};
          let tIn = 0;
          let tOut = 0;
          const recents = [];

          // อ่านข้อมูลจากล่างขึ้นบน (แถวล่างสุดคือข้อมูลล่าสุด)
          for(let i = rows.length - 1; i >= 1; i--) {
            const cells = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/"/g, ''));
            const lineName = lineIdx !== -1 ? cells[lineIdx] : 'ไม่ระบุ';
            const action = statusIdx !== -1 ? cells[statusIdx].toUpperCase() : '';
            const qty = qtyIdx !== -1 ? (parseInt(cells[qtyIdx], 10) || 0) : 0;
            const itemName = itemNameIdx !== -1 ? cells[itemNameIdx] : 'ไม่ระบุสินค้า';
            const person = personIdx !== -1 ? cells[personIdx] : 'ไม่ระบุชื่อ';
            const dateStr = dateIdx !== -1 && cells[dateIdx] ? cells[dateIdx] : '-';

            if (!lineName || lineName === '') continue;

            // เก็บ Recent History สูงสุด 15 รายการ
            if (recents.length < 15) {
                recents.push({ date: dateStr, person, line: lineName, status: action, item: itemName, qty });
            }

            if (!lineMap[lineName]) lineMap[lineName] = { name: lineName, in: 0, out: 0 };

            if (action.includes('OUT')) {
              tOut += qty;
              lineMap[lineName].out += qty;
              pOutMap[person] = (pOutMap[person] || 0) + qty;
            } else if (action.includes('IN')) {
              tIn += qty;
              lineMap[lineName].in += qty;
              pInMap[person] = (pInMap[person] || 0) + qty;
            }
          }

          // อัปเดตข้อมูลชุดใหม่เข้าสู่ State
          setDashStats(prev => ({ ...prev, totalIn: tIn, totalOut: tOut }));
          setLineStats(Object.values(lineMap));
          setPersonInStats(Object.entries(pInMap).map(([name, value]) => ({name, value})).sort((a,b)=>b.value-a.value).slice(0,5));
          setPersonOutStats(Object.entries(pOutMap).map(([name, value]) => ({name, value})).sort((a,b)=>b.value-a.value).slice(0,5));
          setRecentHistory(recents);

        } catch (error) {
          console.error('Error fetching history:', error);
        }
      };

      useEffect(() => {
        fetchStockData();
        fetchHistoryData();
        const intervalId = setInterval(() => { 
            fetchStockData(); 
            fetchHistoryData();
        }, 120000);
        return () => clearInterval(intervalId);
      }, []);

      useEffect(() => {
        const results = inventory.filter(item => 
          (item.id && item.id.toLowerCase().includes(searchTerm.toLowerCase())) || 
          (item.name && item.name.toLowerCase().includes(searchTerm.toLowerCase())) ||
          (item.barcode && item.barcode.toLowerCase().includes(searchTerm.toLowerCase()))
        );
        setFilteredInventory(results);
      }, [searchTerm, inventory]);

      const handleScanSubmit = (e) => {
        e.preventDefault();
        if (!scannerCode) return;

        const foundItem = inventory.find(item => 
          (item.barcode && item.barcode === scannerCode) || 
          (item.id && item.id === scannerCode)
        );
        
        if (foundItem) {
          setModalState({
            isOpen: true,
            type: 'OUT',
            itemCode: foundItem.id, 
            qty: 1,
            person: '',
            line: '',
            isAuthorized: true, // แสกนออก ไม่ต้องใส่รหัส
            passwordInput: ''
          });
        } else {
          setStatusMessage({ type: 'error', text: `ไม่พบรหัสสินค้าหรือบาร์โค้ด: ${scannerCode}` });
          setTimeout(() => setStatusMessage({ type: '', text: '' }), 3000);
        }
        setScannerCode('');
      };

      const handleTransactionSubmit = async (e) => {
        e.preventDefault();
        if (!modalState.person.trim()) {
          alert("กรุณากรอกชื่อผู้รับผิดชอบ");
          return;
        }
        if (!modalState.line.trim()) {
          alert("กรุณากรอก Line / ไลน์การผลิต");
          return;
        }

        setIsLoading(true);
        setModalState({ ...modalState, isOpen: false }); 

        const payload = {
          action: 'updateStock',
          itemCode: modalState.itemCode,
          type: modalState.type,
          qty: modalState.qty,
          person: modalState.person,
          line: modalState.line 
        };

        try {
          const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            mode: 'no-cors' 
          });
          
          setStatusMessage({ type: 'success', text: `ส่งคำสั่งบันทึกรายการ ${modalState.type === 'IN' ? 'เข้า' : 'ออก'} สู่ระบบแล้ว` });
          setTimeout(() => { 
              fetchStockData(); 
              fetchHistoryData(); // โหลดกราฟใหม่
          }, 2500);
          
        } catch (error) {
          console.error('Transaction Error:', error);
          setStatusMessage({ type: 'error', text: 'เกิดข้อผิดพลาดในการส่งข้อมูล' });
        } finally {
          setIsLoading(false);
          setTimeout(() => setStatusMessage({ type: '', text: '' }), 4000);
          if(scannerInputRef.current) scannerInputRef.current.focus();
        }
      };

      const lowStockItems = inventory.filter(item => item.qty < item.safetyStock);

      // Component สำหรับแสดง Tooltip เมื่อชี้ที่กราฟ
      const CustomTooltip = ({ active, payload, label }) => {
        if (active && payload && payload.length) {
          const data = payload[0].payload;
          return (
            <div className="bg-white p-3 border border-slate-200 shadow-lg rounded-lg max-w-[200px] sm:max-w-xs z-50">
              <p className="font-bold text-slate-800 border-b border-slate-100 pb-1 mb-2 text-xs sm:text-sm">{label}</p>
              <p className="text-xs sm:text-sm font-semibold text-slate-600 mb-2">รวมทั้งหมด: <span className="text-slate-800">{data.total}</span></p>
              <div className="text-[10px] sm:text-xs space-y-1">
                {data.itemsList.slice(0, 5).map((item, idx) => (
                  <div key={idx} className="flex justify-between gap-3">
                    <span className="truncate text-slate-500">{item.name}</span>
                    <span className="font-medium text-slate-700">{item.qty}</span>
                  </div>
                ))}
                {data.itemsList.length > 5 && (
                  <div className="text-slate-400 italic mt-1">...และอื่นๆ อีก {data.itemsList.length - 5} รายการ</div>
                )}
              </div>
            </div>
          );
        }
        return null;
      };

      const exportLowStockCSV = () => {
        if (lowStockItems.length === 0) {
          alert('ไม่มีสินค้าใกล้หมดให้ Export');
          return;
        }
        const headers = ['รหัสสินค้า', 'ชื่อสินค้า', 'บาร์โค้ด', 'คงเหลือ', 'ขั้นต่ำ'];
        const csvRows = [headers.join(',')];
        lowStockItems.forEach(item => {
          const name = `"${(item.name || '').replace(/"/g, '""')}"`;
          csvRows.push(`${item.id},${name},${item.barcode || ''},${item.qty},${item.safetyStock}`);
        });
        const csvContent = "\uFEFF" + csvRows.join('\n'); 
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        
        link.href = url;
        link.setAttribute('download', `low_stock_items_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      return (
        <div className="min-h-screen bg-slate-50 p-2 sm:p-4 lg:p-6 tv:p-10 font-sans transition-all duration-300">
          <div className="w-full xl:max-w-[98%] 2xl:max-w-[95%] mx-auto space-y-3 sm:space-y-4 lg:space-y-6 tv:space-y-8">
            
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-4 md:p-5 tv:p-8 rounded-xl shadow-sm border border-slate-100 gap-3">
              <div>
                <h1 className="text-lg sm:text-xl lg:text-2xl tv:text-4xl font-bold text-slate-800 flex items-center gap-2 tv:gap-4">
                  <i className="fas fa-boxes text-blue-600"></i> FA-Stock Management
                </h1>
                <p className="text-xs sm:text-sm lg:text-base tv:text-2xl text-slate-500 mt-1">ระบบจัดการสต็อกคงคลังอัจฉริยะ</p>
              </div>
              <button 
                onClick={() => { fetchStockData(); fetchHistoryData(); }}
                disabled={isLoading}
                className="w-full md:w-auto px-3 py-2 lg:px-4 lg:py-2.5 tv:px-8 tv:py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs sm:text-sm lg:text-base tv:text-2xl rounded-lg flex justify-center items-center gap-2 transition-colors disabled:opacity-50"
              >
                <i className={`fas fa-sync-alt ${isLoading ? "fa-spin" : ""}`}></i>
                รีเฟรชข้อมูล
              </button>
            </div>

            {statusMessage.text && (
              <div className={`p-3 lg:p-4 tv:p-6 rounded-lg flex items-center gap-2 lg:gap-3 tv:gap-5 ${statusMessage.type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`}>
                {statusMessage.type === 'error' ? <i className="fas fa-exclamation-triangle text-base lg:text-xl tv:text-3xl"></i> : <i className="fas fa-check-circle text-base lg:text-xl tv:text-3xl"></i>}
                <span className="font-medium text-xs sm:text-sm lg:text-base tv:text-2xl">{statusMessage.text}</span>
              </div>
            )}

            {/* ระบบ Tabs */}
            <div className="flex space-x-2 border-b border-slate-200 mb-2 sm:mb-4">
              <button
                onClick={() => setActiveTab('inventory')}
                className={`px-4 py-3 font-semibold text-sm sm:text-base tv:text-2xl border-b-2 transition-colors flex items-center gap-2 ${
                  activeTab === 'inventory' 
                    ? 'border-blue-600 text-blue-600' 
                    : 'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300'
                }`}
              >
                <i className="fas fa-boxes"></i> รายการสต็อกสินค้า
              </button>
              <button
                onClick={() => setActiveTab('dashboard')}
                className={`px-4 py-3 font-semibold text-sm sm:text-base tv:text-2xl border-b-2 transition-colors flex items-center gap-2 ${
                  activeTab === 'dashboard' 
                    ? 'border-blue-600 text-blue-600' 
                    : 'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300'
                }`}
              >
                <i className="fas fa-chart-pie"></i> สรุปข้อมูลการเบิก-เติม
              </button>
            </div>

            {/* แสดงผลตาม Tab ที่เลือก */}
            {activeTab === 'inventory' ? (
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-3 sm:gap-4 lg:gap-6 tv:gap-8 animate-in fade-in duration-300">
                
                <div className="lg:col-span-4 xl:col-span-3 space-y-3 sm:space-y-4 lg:space-y-6 tv:space-y-8">
                  
                  <div className="bg-white p-4 lg:p-5 tv:p-8 rounded-xl shadow-sm border border-slate-100">
                    <h2 className="text-sm sm:text-base lg:text-lg tv:text-3xl font-bold text-slate-800 mb-2 lg:mb-4 flex items-center gap-2">
                      <i className="fas fa-barcode"></i> สแกนบาร์โค้ด
                    </h2>
                    <form onSubmit={handleScanSubmit}>
                      <div className="relative">
                        <input
                          ref={scannerInputRef}
                          type="text"
                          placeholder="สแกนรหัส..."
                          className="w-full pl-8 sm:pl-10 tv:pl-16 pr-3 py-2 lg:py-3 tv:py-5 border-2 border-blue-100 rounded-lg focus:border-blue-500 focus:ring-0 outline-none transition-all text-slate-700 font-medium text-xs sm:text-sm lg:text-base tv:text-2xl"
                          value={scannerCode}
                          onChange={(e) => setScannerCode(e.target.value)}
                          autoFocus
                        />
                        <i className="fas fa-barcode absolute left-2.5 sm:left-3 tv:left-5 top-2.5 lg:top-3.5 tv:top-5 text-slate-400 text-sm lg:text-base tv:text-3xl"></i>
                      </div>
                      <p className="text-[10px] sm:text-xs lg:text-sm tv:text-xl text-slate-400 mt-2 text-center">เสียบเครื่องสแกนบาร์โค้ดและยิงเข้าที่ช่องนี้</p>
                    </form>
                  </div>

                  <div className="bg-white p-4 lg:p-5 tv:p-8 rounded-xl shadow-sm border border-red-100">
                    <div className="flex justify-between items-center mb-2 lg:mb-4">
                      <h2 className="text-sm sm:text-base lg:text-lg tv:text-3xl font-bold text-red-600 flex items-center gap-2">
                        <i className="fas fa-exclamation-triangle"></i> สินค้าใกล้หมด ({lowStockItems.length})
                      </h2>
                      <button
                        onClick={exportLowStockCSV}

                              <div className="font-bold text-slate-800 text-xs sm:text-sm tv:text-2xl truncate">{item.name}</div>
                              <div className="text-[10px] sm:text-xs tv:text-xl text-slate-500 truncate">รหัส: {item.id}</div>
                            </div>
                            <div className="text-right shrink-0">
                              <div className="text-red-600 font-bold text-sm sm:text-base lg:text-lg tv:text-4xl">{item.qty}</div>
                              <div className="text-[10px] sm:text-xs tv:text-xl text-slate-500">ขั้นต่ำ: {item.safetyStock}</div>
                            </div>
                          </div>
                        ))}
                      </div>

                        <i className="fas fa-check-circle text-3xl lg:text-4xl tv:text-6xl mb-2 text-green-400"></i>
                        <p className="text-xs sm:text-sm tv:text-xl">สินค้าคงคลังอยู่ในเกณฑ์ปกติ</p>
                      </div>
                    )}
                  </div>
                </div>

                <div className="lg:col-span-8 xl:col-span-9 flex flex-col gap-4">

                      <h2 className="text-base sm:text-lg lg:text-xl tv:text-4xl font-bold text-slate-800">รายการสินค้าทั้งหมด</h2>
                      
                      <div className="relative w-full sm:w-56 lg:w-72 tv:w-96">
                        <i className="fas fa-search absolute left-2.5 lg:left-3 tv:left-5 top-2 sm:top-2.5 tv:top-4 text-slate-400 text-xs sm:text-sm tv:text-2xl"></i>

                          type="text"
                          placeholder="ค้นหารหัส/ชื่อสินค้า..."

                          value={searchTerm}
                          onChange={(e) => setSearchTerm(e.target.value)}
                        />
                      </div>
                    </div>

                    <div className="overflow-x-auto w-full flex-1 border border-slate-100 rounded-lg">
                      <table className="w-full text-left border-collapse min-w-[600px] lg:min-w-full">
                        <thead className="bg-slate-50 sticky top-0 z-10">
                          <tr className="text-slate-500 text-[10px] sm:text-xs lg:text-sm tv:text-2xl border-b border-slate-200 whitespace-nowrap">
                            <th className="p-1.5 sm:p-2 lg:p-3 tv:p-6 font-medium">รหัส / บาร์โค้ด</th>
                            <th className="p-1.5 sm:p-2 lg:p-3 tv:p-6 font-medium">ชื่อสินค้า</th>
                            <th className="p-1.5 sm:p-2 lg:p-3 tv:p-6 font-medium text-center">รูปภาพ</th>
                            <th className="p-1.5 sm:p-2 lg:p-3 tv:p-6 font-medium text-center">คงเหลือ</th>
                            <th className="p-1.5 sm:p-2 lg:p-3 tv:p-6 font-medium text-center text-blue-600 bg-blue-50/50 border-l border-slate-200">เติมสต็อก</th>
                            <th className="p-1.5 sm:p-2 lg:p-3 tv:p-6 font-medium text-center text-amber-600 bg-amber-50/50">เบิกสต็อก</th>
                            <th className="p-1.5 sm:p-2 lg:p-3 tv:p-6 font-medium text-center border-l border-slate-200">สถานะ</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {isLoading && inventory.length === 0 ? (
                            <tr><td colSpan="7" className="text-center py-6 lg:py-10 text-slate-400 text-xs sm:text-sm tv:text-xl">กำลังโหลดข้อมูล...</td></tr>
                          ) : filteredInventory.length === 0 ? (
                            <tr><td colSpan="7" className="text-center py-6 lg:py-10 text-slate-400 text-xs sm:text-sm tv:text-xl">ไม่พบสินค้าที่ค้นหา</td></tr>
                          ) : (
                            filteredInventory.map(item => (
                              <tr key={item.id} className="hover:bg-slate-50 transition-colors group">
                                <td className="p-1.5 sm:p-2 lg:p-3 tv:p-6 text-slate-600 font-mono align-middle">
                                  <div className="font-bold text-slate-800 text-[11px] sm:text-xs lg:text-sm tv:text-2xl">{item.id}</div>
                                  {item.barcode && <div className="text-[9px] sm:text-[10px] lg:text-xs tv:text-xl text-slate-400 mt-0.5">บาร์โค้ด: {item.barcode}</div>}
                                </td>
                                <td className="p-1.5 sm:p-2 lg:p-3 tv:p-6 font-medium text-slate-800 align-middle">
                                  <div className="text-[11px] sm:text-xs lg:text-sm tv:text-3xl">{item.name}</div>
                                  {item.nameChina && <div className="text-[9px] sm:text-[10px] lg:text-xs tv:text-xl text-slate-500 font-normal mt-0.5">{item.nameChina}</div>}
                                </td>
                                <td className="p-1.5 sm:p-2 lg:p-3 tv:p-6 align-middle">
                                  <div className="flex justify-center">
                                    {getDirectImageUrl(item.picUrl) ? (
                                      <img 
                                        src={getDirectImageUrl(item.picUrl)} 
                                        alt={item.name} 
                                        className="w-12 h-12 sm:w-14 sm:h-14 lg:w-16 lg:h-16 tv:w-32 tv:h-32 object-contain p-1 rounded-md border border-slate-200 bg-white transition-all duration-300 ease-in-out hover:scale-[2.5] lg:hover:scale-[3] hover:-translate-y-2 hover:shadow-2xl relative z-10 hover:z-50 cursor-pointer" 
                                        onError={(e) => { 
                                          e.target.onerror = null; 
                                          e.target.src = 'https://placehold.co/100x100/f8fafc/94a3b8?text=No+Img'; 
                                        }} 
                                      />
                                    ) : (
                                      <div className="w-12 h-12 sm:w-14 sm:h-14 lg:w-16 lg:h-16 tv:w-32 tv:h-32 bg-slate-100 rounded-md flex items-center justify-center text-slate-400 border border-slate-200 transition-all duration-300 ease-in-out hover:scale-[2.5] lg:hover:scale-[3] hover:-translate-y-2 hover:shadow-2xl relative z-10 hover:z-50 cursor-pointer">
                                         <i className="fas fa-image text-sm lg:text-lg tv:text-3xl"></i>
                                      </div>
                                    )}
                                  </div>
                                </td>
                                <td className="p-1.5 sm:p-2 lg:p-3 tv:p-6 text-center align-middle">
                                  <span className={`inline-flex items-baseline px-2 py-0.5 sm:py-1 lg:px-3 lg:py-1 tv:px-5 tv:py-2 rounded-full text-[10px] sm:text-xs lg:text-sm tv:text-2xl font-bold ${
                                    item.qty < item.safetyStock ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'
                                  }`}>
                                    {item.qty} <span className="text-[8px] sm:text-[9px] lg:text-xs tv:text-lg font-normal opacity-80 ml-1">{item.unit}</span>
                                  </span>
                                </td>
                                {/* คอลัมน์ เติมสต็อก */}
                                <td className="p-1.5 sm:p-2 lg:p-3 tv:p-6 align-middle text-center bg-blue-50/30 border-l border-slate-100">
                                  <button 
                                    onClick={() => setModalState({ isOpen: true, type: 'IN', itemCode: item.id, qty: 1, person: '', line: '', isAuthorized: false, passwordInput: '' })}
                                    className="w-8 h-8 sm:w-10 sm:h-10 lg:w-12 lg:h-12 tv:w-20 tv:h-20 inline-flex items-center justify-center bg-blue-100 hover:bg-blue-200 text-blue-600 rounded-md transition-colors shadow-sm"
                                    title="เติมสต็อก"
                                  >
                                    <i className="fas fa-cart-plus text-[12px] sm:text-sm lg:text-base tv:text-3xl"></i>
                                  </button>
                                </td>
                                {/* คอลัมน์ เบิกสต็อก */}
                                <td className="p-1.5 sm:p-2 lg:p-3 tv:p-6 align-middle text-center bg-amber-50/30">
                                  <button 
                                    onClick={() => setModalState({ isOpen: true, type: 'OUT', itemCode: item.id, qty: 1, person: '', line: '', isAuthorized: true, passwordInput: '' })}
                                    className="w-8 h-8 sm:w-10 sm:h-10 lg:w-12 lg:h-12 tv:w-20 tv:h-20 inline-flex items-center justify-center bg-amber-100 hover:bg-amber-200 text-amber-600 rounded-md transition-colors shadow-sm"
                                    title="เบิกจ่าย"
                                  >
                                    <i className="fas fa-dolly text-[12px] sm:text-sm lg:text-base tv:text-3xl"></i>
                                  </button>
                                </td>
                                {/* คอลัมน์ Status */}
                                <td className="p-1.5 sm:p-2 lg:p-3 tv:p-6 text-center align-middle border-l border-slate-100">
                                  {item.status ? (
                                    <span className="inline-block px-2 py-1 bg-slate-100 border border-slate-200 text-slate-600 rounded text-[10px] sm:text-xs lg:text-sm whitespace-nowrap">
                                      {item.status}
                                    </span>
                                  ) : (
                                    <span className="text-slate-300">-</span>
                                  )}
                                </td>
                              </tr>
                            ))
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            ) : (
              /* โหมด Dashboard ระดับมืออาชีพ */
              <div className="flex flex-col gap-4 lg:gap-6 tv:gap-8 animate-in fade-in duration-300">
                
                {/* Row 1: 4 KPI Cards */}
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 tv:gap-6">
                  {/* KPI 1: Status */}
                  <div className="bg-white p-4 tv:p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col justify-between">
                    <div className="text-xs tv:text-xl font-bold text-slate-500 mb-2 flex items-center gap-2 uppercase tracking-wide"><i className="fas fa-chart-pie"></i> Status Order</div>
                    <div className="flex justify-between items-center mt-2">
                      <div className="text-3xl lg:text-4xl tv:text-6xl font-extrabold text-slate-800">{inventory.length}</div>
                      <div className="text-[10px] tv:text-lg text-slate-500 flex flex-col gap-1">
                        {dashStats.statusCount.slice(0, 3).map((s, i) => (
                           <div key={i} className="flex items-center gap-1.5 whitespace-nowrap">
                             <span className="w-2.5 h-2.5 rounded-full" style={{backgroundColor: ['#3b82f6', '#f59e0b', '#10b981', '#ef4444'][i%4]}}></span>
                             {s.name} <span className="font-bold text-slate-700 ml-1">{s.value}</span>
                           </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* KPI 2: Re-stocking */}
                  <div className="bg-white p-4 tv:p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col justify-between">
                    <div className="text-xs tv:text-xl font-bold text-slate-500 mb-2 flex items-center gap-2 uppercase tracking-wide"><i className="fas fa-sync text-blue-500"></i> Re-Stocking (Total IN)</div>
                    <div className="mt-2">
                      <div className="text-3xl lg:text-4xl tv:text-6xl font-extrabold text-blue-600">+{dashStats.totalIn.toLocaleString()}</div>
                      <div className="text-xs tv:text-lg text-emerald-500 font-medium mt-1 flex items-center gap-1"><i className="fas fa-arrow-up"></i> รายการรับเข้าทั้งหมด</div>
                    </div>
                  </div>

                  {/* KPI 3: Stock Issued */}
                  <div className="bg-white p-4 tv:p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col justify-between">
                    <div className="text-xs tv:text-xl font-bold text-slate-500 mb-2 flex items-center gap-2 uppercase tracking-wide"><i className="fas fa-dolly text-amber-500"></i> Stock Issued (Total OUT)</div>
                    <div className="mt-2">
                      <div className="text-3xl lg:text-4xl tv:text-6xl font-extrabold text-amber-600">-{dashStats.totalOut.toLocaleString()}</div>
                      <div className="text-xs tv:text-lg text-rose-500 font-medium mt-1 flex items-center gap-1"><i className="fas fa-arrow-down"></i> รายการเบิกออกทั้งหมด</div>
                    </div>
                  </div>

                  {/* KPI 4: Total Inventory */}
                  <div className="bg-white p-4 tv:p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col justify-between">
                    <div className="text-xs tv:text-xl font-bold text-slate-500 mb-2 flex items-center gap-2 uppercase tracking-wide"><i className="fas fa-boxes text-emerald-500"></i> Total Inventory</div>
                    <div className="mt-2">
                      <div className="text-3xl lg:text-4xl tv:text-6xl font-extrabold text-slate-800">{dashStats.totalInv.toLocaleString()}</div>
                      <div className="text-xs tv:text-lg text-slate-400 font-medium mt-1">จำนวนชิ้นส่วนคงเหลือในคลังปัจจุบัน</div>
                    </div>
                  </div>
                </div>

                {/* Row 2: Main Bar Chart + Alerts */}
                <div className="grid grid-cols-1 xl:grid-cols-3 gap-4 lg:gap-6 tv:gap-8">
                  {/* Left: Bar Chart */}
                  <div className="xl:col-span-2 bg-white p-4 lg:p-5 tv:p-8 rounded-xl shadow-sm border border-slate-100">
                    <h3 className="text-sm lg:text-base tv:text-2xl font-bold text-slate-800 mb-4 uppercase tracking-wide">Stock Balance Summary (IN vs OUT by Line)</h3>
                    {lineStats.length === 0 ? (
                      <div className="h-[250px] lg:h-[350px] flex items-center justify-center text-slate-400">ไม่มีข้อมูลแสดงผล</div>
                    ) : (
                      <div className="w-full h-[250px] lg:h-[350px] tv:h-[500px]">
                        <ResponsiveContainer width="100%" height="100%">
                          <BarChart data={lineStats} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                            <XAxis dataKey="name" tick={{fontSize: 11, fill: '#64748b'}} axisLine={false} tickLine={false} />
                            <YAxis tick={{fontSize: 11, fill: '#64748b'}} axisLine={false} tickLine={false} />
                            <Tooltip cursor={{fill: '#f8fafc'}} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)', fontSize: '12px'}} />
                            <Legend wrapperStyle={{fontSize: '12px', paddingTop: '20px'}} />
                            <Bar dataKey="in" name="Re-stocking (IN)" fill="#3b82f6" radius={[4, 4, 0, 0]} maxBarSize={40} />
                            <Bar dataKey="out" name="Stock Issued (OUT)" fill="#f59e0b" radius={[4, 4, 0, 0]} maxBarSize={40} />
                          </BarChart>
                        </ResponsiveContainer>
                      </div>
                    )}
                  </div>

                  {/* Right: Low Stock Alert Table */}
                  <div className="xl:col-span-1 bg-white p-4 lg:p-5 tv:p-8 rounded-xl shadow-sm border border-slate-100 flex flex-col h-[320px] lg:h-[430px] tv:h-[580px]">
                    <div className="flex justify-between items-center mb-4">
                      <h3 className="text-sm lg:text-base tv:text-2xl font-bold text-slate-800 uppercase tracking-wide">Low Stock Alert</h3>
                      <span className="px-2 py-1 bg-rose-100 text-rose-600 rounded text-[10px] tv:text-base font-bold">{lowStockItems.length} Items</span>
                    </div>
                    <div className="flex-1 overflow-y-auto pr-1">
                       <table className="w-full text-left border-collapse">
                          <thead className="bg-slate-50 sticky top-0">
                            <tr className="text-slate-500 text-[10px] tv:text-lg border-b border-slate-200 uppercase">
                              <th className="py-2 px-1 font-semibold">Item Name</th>
                              <th className="py-2 px-1 font-semibold text-right">Q'ty</th>
                              <th className="py-2 px-1 font-semibold text-center">Status</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {lowStockItems.slice(0, 12).map((item, idx) => (
                              <tr key={idx} className="text-[11px] tv:text-xl text-slate-600 hover:bg-slate-50">
                                <td className="py-2.5 px-1 font-medium truncate max-w-[120px]" title={item.name}>{item.name}</td>
                                <td className="py-2.5 px-1 text-right font-bold text-rose-500">{item.qty}</td>
                                <td className="py-2.5 px-1 text-center"><i className="fas fa-exclamation-circle text-rose-500"></i></td>
                              </tr>
                            ))}
                            {lowStockItems.length === 0 && (
                              <tr><td colSpan="3" className="py-8 text-center text-slate-400">สถานะสต็อกปกติ ไม่มีสินค้าใกล้หมด</td></tr>
                            )}
                          </tbody>
                       </table>
                    </div>
                  </div>
                </div>

                {/* Row 3: Person Pies & Recent History */}
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 lg:gap-6 tv:gap-8">
                  
                  {/* Pie 1: Stock Issued by Person */}
                  <div className="bg-white p-4 lg:p-5 tv:p-8 rounded-xl shadow-sm border border-slate-100 flex flex-col h-[300px] tv:h-[450px]">
                    <h3 className="text-sm lg:text-base tv:text-2xl font-bold text-slate-800 mb-1 uppercase tracking-wide">Stock Issued By Person</h3>
                    <p className="text-[10px] tv:text-lg text-slate-500 mb-2">Top 5 issuers (การเบิกออก)</p>
                    <div className="flex-1 w-full relative">
                      {personOutStats.length === 0 ? (
                        <div className="absolute inset-0 flex items-center justify-center text-slate-400">ไม่มีข้อมูล</div>
                      ) : (
                        <ResponsiveContainer width="100%" height="100%">
                          <PieChart>
                            <Pie data={personOutStats} innerRadius="55%" outerRadius="80%" paddingAngle={2} dataKey="value" stroke="none" label={({percent}) => `${(percent * 100).toFixed(0)}%`} labelLine={false} cx="40%">
                              {personOutStats.map((entry, index) => <Cell key={`cell-${index}`} fill={['#f59e0b', '#fbbf24', '#fcd34d', '#fef3c7', '#d97706'][index % 5]} />)}
                            </Pie>
                            <Tooltip contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)', fontSize: '11px'}} />
                            <Legend layout="vertical" verticalAlign="middle" align="right" wrapperStyle={{fontSize: '11px'}} />
                          </PieChart>
                        </ResponsiveContainer>
                      )}
                    </div>
                  </div>

                  {/* Pie 2: Re-stocking by Person */}
                  <div className="bg-white p-4 lg:p-5 tv:p-8 rounded-xl shadow-sm border border-slate-100 flex flex-col h-[300px] tv:h-[450px]">
                    <h3 className="text-sm lg:text-base tv:text-2xl font-bold text-slate-800 mb-1 uppercase tracking-wide">Re-stocking By Person</h3>
                    <p className="text-[10px] tv:text-lg text-slate-500 mb-2">Top 5 refillers (การเติมสต็อก)</p>
                    <div className="flex-1 w-full relative">
                      {personInStats.length === 0 ? (
                         <div className="absolute inset-0 flex items-center justify-center text-slate-400">ไม่มีข้อมูล</div>
                      ) : (
                        <ResponsiveContainer width="100%" height="100%">
                          <PieChart>
                            <Pie data={personInStats} innerRadius="55%" outerRadius="80%" paddingAngle={2} dataKey="value" stroke="none" label={({percent}) => `${(percent * 100).toFixed(0)}%`} labelLine={false} cx="40%">
                              {personInStats.map((entry, index) => <Cell key={`cell-${index}`} fill={['#3b82f6', '#60a5fa', '#93c5fd', '#dbeafe', '#2563eb'][index % 5]} />)}
                            </Pie>
                            <Tooltip contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)', fontSize: '11px'}} />
                            <Legend layout="vertical" verticalAlign="middle" align="right" wrapperStyle={{fontSize: '11px'}} />
                          </PieChart>
                        </ResponsiveContainer>
                      )}
                    </div>
                  </div>

                  {/* Recent History Table */}
                  <div className="bg-white p-4 lg:p-5 tv:p-8 rounded-xl shadow-sm border border-slate-100 flex flex-col h-[300px] tv:h-[450px]">
                    <h3 className="text-sm lg:text-base tv:text-2xl font-bold text-slate-800 mb-4 uppercase tracking-wide">Recent FA Stock History</h3>
                    <div className="flex-1 overflow-y-auto pr-1">
                       <table className="w-full text-left border-collapse">
                          <thead className="bg-slate-50 sticky top-0 z-10">
                            <tr className="text-slate-500 text-[9px] tv:text-lg border-b border-slate-200 uppercase whitespace-nowrap">
                              <th className="py-2 px-1 font-semibold">Date/Time</th>
                              <th className="py-2 px-1 font-semibold">Name</th>
                              <th className="py-2 px-1 font-semibold">Line</th>
                              <th className="py-2 px-1 font-semibold text-center">Status</th>
                              <th className="py-2 px-1 font-semibold">Item</th>
                              <th className="py-2 px-1 font-semibold text-right">Q'ty</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {recentHistory.map((row, idx) => (
                              <tr key={idx} className="text-[10px] tv:text-xl text-slate-600 hover:bg-slate-50">
                                <td className="py-2 px-1 truncate max-w-[70px]" title={row.date}>{row.date}</td>
                                <td className="py-2 px-1 font-medium truncate max-w-[60px]" title={row.person}>{row.person}</td>
                                <td className="py-2 px-1 truncate max-w-[50px]">{row.line}</td>
                                <td className="py-2 px-1 text-center">
                                  <span className={`px-1.5 py-0.5 rounded text-[8px] tv:text-sm font-bold text-white tracking-wider ${row.status.includes('IN') ? 'bg-blue-500' : 'bg-amber-500'}`}>
                                    {row.status.includes('IN') ? 'IN' : 'OUT'}
                                  </span>
                                </td>
                                <td className="py-2 px-1 truncate max-w-[90px]" title={row.item}>{row.item}</td>
                                <td className="py-2 px-1 text-right font-bold text-slate-800">{row.qty}</td>
                              </tr>
                            ))}
                            {recentHistory.length === 0 && (
                              <tr><td colSpan="6" className="py-8 text-center text-slate-400">ยังไม่มีประวัติการทำรายการ</td></tr>
                            )}
                          </tbody>
                       </table>
                    </div>
                  </div>
                  
                </div>
              </div>
            )}
          </div>

          {modalState.isOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-3 sm:p-4 z-50">
              <div className="bg-white rounded-xl sm:rounded-2xl w-full max-w-[95%] sm:max-w-sm lg:max-w-md tv:max-w-2xl overflow-hidden shadow-2xl animate-in fade-in zoom-in duration-200">
                <div className={`p-3 sm:p-4 lg:p-5 flex justify-between items-center text-white ${modalState.type === 'IN' ? 'bg-blue-600' : 'bg-amber-500'}`}>
                  <h3 className="font-bold text-base sm:text-lg tv:text-3xl flex items-center gap-2">
                    {modalState.type === 'IN' ? <i className="fas fa-cart-plus"></i> : <i className="fas fa-dolly"></i>}
                    {modalState.type === 'IN' ? 'ทำรายการ: เติมสต็อก (IN) / 入库' : 'ทำรายการ: เบิกจ่าย (OUT) / 出库'}
                  </h3>
                  <button onClick={() => setModalState({...modalState, isOpen: false})} className="text-white/80 hover:text-white">
                    <i className="fas fa-times text-lg sm:text-xl tv:text-4xl"></i>
                  </button>
                </div>
                
                {!modalState.isAuthorized ? (
                  <div className="p-4 sm:p-5 lg:p-6 tv:p-10 space-y-4 sm:space-y-6 tv:space-y-8">
                    <div className="text-center space-y-2">
                      <div className="w-16 h-16 sm:w-20 sm:h-20 tv:w-24 tv:h-24 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-2 sm:mb-4">
                        <i className="fas fa-lock text-2xl sm:text-3xl tv:text-5xl"></i>
                      </div>
                      <h3 className="text-sm sm:text-base lg:text-lg tv:text-3xl font-bold text-slate-800">ยืนยันตัวตน</h3>
                      <p className="text-xs sm:text-sm tv:text-xl text-slate-500">กรุณาใส่รหัสผ่านเพื่อดำเนินการ <strong>"เติมสต็อก"</strong></p>
                    </div>
                    <div>
                      <input
                        type="password"
                        autoFocus
                        placeholder="รหัสผ่าน..."
                        className="w-full p-2 sm:p-3 tv:p-5 border-2 border-slate-300 rounded-lg focus:border-blue-500 outline-none text-center text-lg sm:text-xl tv:text-4xl tracking-[0.25em]"
                        value={modalState.passwordInput || ''}
                        onChange={(e) => setModalState({...modalState, passwordInput: e.target.value})}
                        onKeyDown={(e) => {
                          if (e.key === 'Enter') {
                            e.preventDefault();
                            if (modalState.passwordInput === 'Amp888') {
                              setModalState({...modalState, isAuthorized: true});
                            } else {
                              alert('รหัสผ่านไม่ถูกต้อง!');
                            }
                          }
                        }}
                      />
                    </div>
                    <div className="pt-2 flex gap-2 sm:gap-3 tv:gap-6">
                      <button
                        type="button"
                        onClick={() => setModalState({...modalState, isOpen: false})}
                        className="flex-1 py-2 sm:py-2.5 tv:py-5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-medium transition-colors text-xs sm:text-sm tv:text-2xl"
                      >
                        ยกเลิก / 取消
                      </button>
                      <button
                        type="button"
                        onClick={() => {
                          if (modalState.passwordInput === 'Amp888') {
                            setModalState({...modalState, isAuthorized: true});
                          } else {
                            alert('รหัสผ่านไม่ถูกต้อง!');
                          }
                        }}
                        className="flex-1 py-2 sm:py-2.5 tv:py-5 text-white rounded-lg font-medium transition-colors text-xs sm:text-sm tv:text-2xl bg-blue-600 hover:bg-blue-700"
                      >
                        ยืนยันรหัสผ่าน / 确认
                      </button>
                    </div>
                  </div>
                ) : (
                  <form onSubmit={handleTransactionSubmit} className="p-4 sm:p-5 lg:p-6 tv:p-10 space-y-3 sm:space-y-4 tv:space-y-8">
                    <div>
                      <label className="block text-xs sm:text-sm tv:text-2xl font-medium text-slate-700 mb-1">รหัสสินค้า / 物品代码</label>
                      <input 
                        type="text" 
                        value={modalState.itemCode} 
                        disabled
                        className="w-full p-2 sm:p-2.5 tv:p-4 bg-slate-100 border border-slate-200 rounded-lg text-slate-600 font-mono text-xs sm:text-sm tv:text-2xl"
                      />
                      <div className="text-xs sm:text-sm tv:text-2xl font-bold text-slate-800 mt-1">
                        {inventory.find(i => i.id === modalState.itemCode)?.name}
                      </div>
                    </div>

                    <div>
                      <label className="block text-xs sm:text-sm tv:text-2xl font-medium text-slate-700 mb-1">จำนวนที่{modalState.type === 'IN' ? 'เติม' : 'เบิก'}</label>
                      <input 
                        type="number" 
                        min="1"
                        required
                        value={modalState.qty}
                        onChange={(e) => setModalState({...modalState, qty: e.target.value})}
                        className="w-full p-2 sm:p-2.5 tv:p-4 border border-slate-300 rounded-lg focus:border-blue-500 outline-none text-base sm:text-lg tv:text-3xl font-bold"
                      />
                    </div>

                    <div>
                      <label className="block text-xs sm:text-sm tv:text-2xl font-medium text-slate-700 mb-1 text-red-600">ชื่อผู้รับผิดชอบ / ผู้เบิก (บังคับ)*</label>
                      <input 
                        type="text" 
                        required
                        placeholder="ระบุชื่อพนักงาน"
                        value={modalState.person}
                        onChange={(e) => setModalState({...modalState, person: e.target.value})}
                        className="w-full p-2 sm:p-2.5 tv:p-4 border-2 border-slate-300 focus:border-red-500 rounded-lg outline-none text-xs sm:text-base tv:text-2xl" 
                        autoFocus={modalState.type === 'OUT'}
                      />
                    </div>

                    <div>
                      <label className="block text-xs sm:text-sm tv:text-2xl font-medium text-slate-700 mb-1 text-red-600">Line / ไลน์การผลิต (บังคับ)*</label>
                      <input 
                        type="text" 
                        required
                        placeholder="ระบุ Line (เช่น Line 1, Line A)"
                        value={modalState.line}
                        onChange={(e) => setModalState({...modalState, line: e.target.value})}
                        className="w-full p-2 sm:p-2.5 tv:p-4 border-2 border-slate-300 focus:border-red-500 rounded-lg outline-none text-xs sm:text-base tv:text-2xl" 
                      />
                    </div>

                    <div className="pt-3 sm:pt-4 tv:pt-6 flex gap-2 sm:gap-3 tv:gap-6">
                      <button 
                        type="button"
                        onClick={() => setModalState({...modalState, isOpen: false})}
                        className="flex-1 py-2 sm:py-2.5 tv:py-5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-medium transition-colors text-xs sm:text-sm tv:text-2xl"
                      >
                        ยกเลิก / 取消
                      </button>
                      <button 
                        type="submit"
                        className={`flex-1 py-2 sm:py-2.5 tv:py-5 text-white rounded-lg font-medium transition-colors text-xs sm:text-sm tv:text-2xl ${modalState.type === 'IN' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-amber-500 hover:bg-amber-600'}`}
                      >
                        ยืนยันบันทึก / 确认
                      </button>
                    </div>
                  </form>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<StockManagementApp />);
  </script>
</body>
</html>
