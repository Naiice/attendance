                                <div className="w-12 h-12 bg-amber-100 text-amber-500 rounded-2xl flex items-center justify-center text-2xl shadow-sm">
                                    <i className="fa-solid fa-star"></i>
                                </div>
                                <div>
                                    <h2 className="text-2xl font-black text-slate-800 tracking-tight flex items-center gap-2">
                                        ตำแหน่งสำคัญ <span className="text-slate-400 text-lg">关键岗位</span>
                                    </h2>
                                    <p className="text-[12px] font-bold text-slate-500 mt-1">
                                        ข้อมูลอ้างอิงเฉพาะ <span className="text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md mx-1">{activeShift}</span> และ <span className="text-orange-600 bg-orange-50 px-2 py-0.5 rounded-md mx-1">{selectedLine}</span>
                                    </p>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3 bg-slate-50 p-2.5 rounded-2xl border border-slate-200 px-4 shadow-inner w-full lg:flex-1 lg:max-w-md xl:max-w-lg">
                                <i className="fa-solid fa-search text-slate-400"></i>
                                <input 
                                    type="text" placeholder="ค้นหารหัส หรือ ชื่อพนักงาน..." 
                                    value={searchTerm} onChange={e => setSearchTerm(e.target.value)} 
                                    className="bg-transparent border-none text-[13px] font-bold outline-none text-slate-800 w-full" 
                                />
                            </div>

                            <div className="flex flex-wrap items-center gap-3 shrink-0">
                                <div className="bg-slate-50 px-5 py-2.5 rounded-full border border-slate-200 shadow-sm flex items-center gap-3">
                                    <span className="text-slate-500 font-bold text-sm">พนักงานสำคัญทั้งหมด</span>
                                    <span className="text-xl font-black text-slate-800">{total} <span className="text-sm font-bold text-slate-400">คน</span></span>
                                </div>
                                <button onClick={handleExportCSV} className="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2.5 rounded-full font-black text-[13px] shadow-sm transition-colors flex items-center gap-2">
                                    <i className="fa-solid fa-file-csv"></i> Export CSV
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2 flex flex-col h-auto lg:h-[600px]">
                                <h3 className="text-[14px] font-black text-slate-800 uppercase tracking-widest mb-4 flex items-center gap-2">
                                    <i className="fa-solid fa-list-ul text-slate-400"></i> รายชื่อพนักงาน (Employees List)
                                </h3>
                                <div className="rounded-2xl border border-slate-200 overflow-hidden shadow-sm flex-1 flex flex-col bg-white">
                                    <div className="overflow-y-auto custom-scrollbar flex-1 w-full overflow-x-auto">
                                        <table className="w-full text-left text-sm min-w-[700px]">
                                            <thead className="bg-slate-50 text-slate-500 font-black text-[11px] uppercase tracking-widest border-b border-slate-200 sticky top-0 z-10">
                                                <tr>
                                                    <th className="px-4 sm:px-5 py-4 w-20 text-center">รหัส (ID)</th>
                                                    <th className="px-4 sm:px-5 py-4">ชื่อ-นามสกุล (Name)</th>
                                                    <th className="px-4 sm:px-5 py-4 w-24 text-center">ไลน์ (Line)</th>
                                                    <th className="px-4 sm:px-5 py-4">ตำแหน่งหลัก (Role)</th>
                                                    <th className="px-4 sm:px-5 py-4">ตำแหน่งเสริม 1 (Role 2)</th>
                                                    <th className="px-4 sm:px-5 py-4">ตำแหน่งเสริม 2 (Role 3)</th>
                                                    <th className="px-4 sm:px-5 py-4">ตำแหน่งเสริม 3 (Role 4)</th>
                                                    <th className="px-4 sm:px-5 py-4 text-center">สังกัด (Contract)</th>
                                                    <th className="px-4 sm:px-5 py-4 w-20 text-center">รูป (Pic)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 font-bold text-slate-600">
                                                {processedList.length > 0 ? (
                                                    processedList.map((emp, idx) => {
                                                        const directPicUrl = getDirectImageUrl(emp.picture);
                                                        
                                                        return (
                                                        <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                            <td className="px-4 sm:px-5 py-3 text-[12px] text-center">{emp.id}</td>
                                                            <td className="px-4 sm:px-5 py-3">{emp.name || '-'}</td>
                                                            <td className="px-4 sm:px-5 py-3 text-center">
                                                                <span className="text-slate-600 font-black bg-slate-100 px-2.5 py-1 rounded-md text-[10px] uppercase tracking-wider">{emp.line}</span>
                                                            </td>
                                                            <td className="px-4 sm:px-5 py-3">
                                                                <div className="flex flex-col items-start gap-1">
                                                                    <span className={`px-2.5 py-0.5 rounded text-[10px] font-black ${emp.category.light} ${emp.category.text} border shadow-sm border-white flex items-center gap-1.5`}>
                                                                        <i className={`fa-solid ${emp.category.icon}`}></i> {emp.category.label}
                                                                    </span>
                                                                    <span className="text-[11px] text-slate-400 font-normal truncate max-w-[150px]" title={emp.role}>{emp.role || '-'}</span>
                                                                </div>
                                                            </td>
                                                            <td className="px-4 sm:px-5 py-3">
                                                                {emp.role2 ? <span className="bg-blue-50 text-blue-600 border border-blue-100 px-2 py-0.5 rounded text-[10px] font-bold whitespace-nowrap">{emp.role2}</span> : <span className="text-slate-300 text-[10px]">-</span>}
                                                            </td>
                                                            <td className="px-4 sm:px-5 py-3">
                                                                {emp.role3 ? <span className="bg-blue-50 text-blue-600 border border-blue-100 px-2 py-0.5 rounded text-[10px] font-bold whitespace-nowrap">{emp.role3}</span> : <span className="text-slate-300 text-[10px]">-</span>}
                                                            </td>
                                                            <td className="px-4 sm:px-5 py-3">
                                                                {emp.role4 ? <span className="bg-blue-50 text-blue-600 border border-blue-100 px-2 py-0.5 rounded text-[10px] font-bold whitespace-nowrap">{emp.role4}</span> : <span className="text-slate-300 text-[10px]">-</span>}
                                                            </td>
                                                            <td className="px-4 sm:px-5 py-3 text-center">
                                                                <span className="text-slate-500 font-bold bg-white border border-slate-200 px-2.5 py-1 rounded-md text-[10px] uppercase tracking-wider shadow-sm">{emp.contract || '-'}</span>
                                                            </td>
                                                            <td className="px-4 sm:px-5 py-2 flex justify-center">
                                                                <div className="relative group cursor-pointer hover:z-[100]">
                                                                    {directPicUrl ? (
                                                                        <div className="w-10 h-10 rounded-full overflow-hidden border border-slate-200 shadow-sm relative bg-slate-100 flex items-center justify-center z-10">
                                                                            <img 
                                                                                src={directPicUrl} alt={emp.name} 
                                                                                className="w-full h-full object-cover"
                                                                                onError={(e) => { e.target.onerror = null; e.target.style.display = 'none'; e.target.nextSibling.style.display = 'block'; }} 
                                                                            />
                                                                            <i className="fa-solid fa-user text-slate-300 text-lg hidden absolute"></i>
                                                                        </div>
                                                                    ) : (
                                                                        <div className="w-10 h-10 rounded-full border border-slate-200 shadow-sm bg-slate-50 flex items-center justify-center z-10">
                                                                            <i className="fa-solid fa-user text-slate-200 text-lg"></i>
                                                                        </div>
                                                                    )}
                                                                    {directPicUrl && (
                                                                        <div className="absolute top-1/2 -translate-y-1/2 -right-[6px] w-0 h-0 border-t-[8px] border-t-transparent border-b-[8px] border-b-transparent border-l-[8px] border-l-[#0f172a]"></div>
                                                                    )}
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    )})
                                                ) : (
                                                    <tr>
                                                        <td colSpan="9" className="px-6 py-20 text-center text-slate-400 italic font-bold">
                                                            ไม่พบพนักงานในตำแหน่งสำคัญสำหรับเงื่อนไขที่เลือก
                                                        </td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-1 flex flex-col h-auto lg:h-[600px] mt-6 lg:mt-0">
                                <h3 className="text-[14px] font-black text-slate-800 uppercase tracking-widest mb-4 flex items-center gap-2">
                                    <i className="fa-solid fa-chart-bar text-slate-400"></i> สรุปจำนวน (Summary)
                                </h3>
                                <div className="bg-slate-50/50 rounded-2xl border border-slate-200 p-6 shadow-inner flex-1 flex flex-col">
                                    <div className="flex-1 flex flex-col justify-center gap-4 relative mt-4">
                                        {KEY_ROLES.map((role) => {
                                            const count = counts[role.id];
                                            const percent = total > 0 ? (count / total) * 100 : 0;
                                            return (
                                                <div key={role.id} className="relative">
                                                    <div className="flex justify-between items-end mb-1.5">
                                                        <div className="flex items-center gap-2">
                                                            <div className={`w-6 h-6 rounded flex items-center justify-center text-white text-[10px] ${role.color} shadow-sm`}>
                                                                <i className={`fa-solid ${role.icon}`}></i>
                                                            </div>
                                                            <div>
                                                                <span className="text-[12px] font-black text-slate-700 block leading-tight">{role.label}</span>
                                                                <span className="text-[9px] font-bold text-slate-400">{role.sub} {role.zh}</span>
                                                            </div>
                                                        </div>
                                                        <div className="text-right">
                                                            <span className={`text-lg font-black ${role.text}`}>{count}</span>
                                                            <span className="text-[10px] font-bold text-slate-400 ml-1">คน</span>
                                                        </div>
                                                    </div>
                                                    <div className="w-full h-3 bg-slate-200 rounded-full overflow-hidden shadow-inner">
                                                        <div className={`h-full ${role.color} rounded-full transition-all duration-1000 ease-out`} style={{ width: `${percent}%` }}></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const OriginalOTSystem = ({ globalEmployees, onRefresh }) => {
          const [saving, setSaving] = useState(false);
          const [status, setStatus] = useState(null);
          const [localSavedIds, setLocalSavedIds] = useState(new Set());
          const [shift, setShift] = useState('Shift A');
          const [selectedLine, setSelectedLine] = useState(2);
          const [targetDate, setTargetDate] = useState(getOriginalLocalDateString());
          
          const [searchTerm, setSearchTerm] = useState('');
          const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, groupId: null, groupName: '' });
          
          const SCRIPT_URL = localStorage.getItem('gasApiUrl') || (typeof GAS_API_URL !== 'undefined' ? GAS_API_URL : 'https://script.google.com/macros/s/AKfycbxeuvLdQinVWwPwUSDZkX7_aHIU9_nbsKWREJ3yw32vyUpyaZ_PZSYlVl-s4tAN0SY/exec'); 

          const ORIGINAL_UI_GROUPS = [
            { id: 'front', name: 'หัวไลน์', sub: '前装-Input', keywords: ['input', '前装', 'หัวไลน์'], isGlobal: false },
            { id: 'middle', name: 'กลางไลน์', sub: '装配-Middle', keywords: ['middle', '装配', 'กลางไลน์'], isGlobal: false },
            { id: 'test', name: 'ห้องทดสอบ', sub: '测试房-Cooling', keywords: ['cooling', '测试房', 'ทดสอบ', 'test'], isGlobal: false },
            { id: 'final', name: 'ท้ายไลน์', sub: '后装-Final', keywords: ['final', '后装', 'ท้ายไลน์'], isGlobal: false },
            { id: 'office', name: 'ออฟฟิศ', sub: '办公室-Office', keywords: ['office', '办公室', 'ออฟฟิศ', 'สำนักงาน'], isGlobal: true },
            { id: 'cost', name: 'คอส', sub: 'Cost-成本', keywords: ['cost', '成本', 'คอส'], isGlobal: true }
          ];

          const [groupState, setGroupState] = useState({
            front: { defaultHours: 2.5, selectedIds: [] },
            middle: { defaultHours: 2.5, selectedIds: [] },
            test: { defaultHours: 2.5, selectedIds: [] },
            final: { defaultHours: 2.5, selectedIds: [] },
            office: { defaultHours: 2.5, selectedIds: [] },
            cost: { defaultHours: 2.5, selectedIds: [] }
          });

          const formatThaiDate = (dateStr) => {
            if (!dateStr) return '';
            const [year, month, day] = dateStr.split('-');
            return `${day}/${month}/${year}`;
          };

          useEffect(() => {
            if (status && status.type === 'success') {
              const timer = setTimeout(() => setStatus(null), 4000);
              return () => clearTimeout(timer);
            }
          }, [status]);

          useEffect(() => {
              const ids = new Set();
              (globalEmployees || []).forEach(emp => {
                  if (parseFloat(emp.otByDate?.[targetDate]) > 0) {
                      ids.add(emp.id);
                  }
              });
              setLocalSavedIds(ids);
          }, [globalEmployees, targetDate]);

          const filteredActiveEmployees = useMemo(() => {
              return (globalEmployees || []).filter(emp => {
                  if (emp.isResignedFromNote) return false;
                  if (emp.resignedDate && new Date(targetDate) >= new Date(emp.resignedDate)) return false;
                  if (emp.shift !== shift) return false;
                  return true;
              });
          }, [globalEmployees, targetDate, shift]);

          const productionEmps = useMemo(() => {
            return filteredActiveEmployees.filter(emp => {
              const cleanLine = String(emp.line).replace(/[^0-9]/g, '');
              return cleanLine === String(selectedLine);
            });
          }, [filteredActiveEmployees, selectedLine]);

          const handleToggleSelect = (groupId, userId) => {
            if (localSavedIds.has(userId)) return;
            setGroupState(prev => {
              const current = prev[groupId].selectedIds;
              const next = current.includes(userId) ? current.filter(id => id !== userId) : [...current, userId];
              return { ...prev, [groupId]: { ...prev[groupId], selectedIds: next } };
            });
          };

          const requestSaveGroup = (groupId, groupName) => {
             const count = groupState[groupId].selectedIds.length;
             if(count > 0) setConfirmDialog({ isOpen: true, groupId, groupName });
          };

          const handleSaveGroupConfirmed = async () => {
            const groupId = confirmDialog.groupId;
            const groupName = confirmDialog.groupName;
            const settings = groupState[groupId];
            
            setConfirmDialog({ isOpen: false, groupId: null, groupName: '' });
            if (settings.selectedIds.length === 0) return;
            
            setSaving(true);
            setStatus(null);
            
            const payload = settings.selectedIds.map(id => {
              const emp = globalEmployees.find(e => e.id === id);
              return {
                date: formatThaiDate(targetDate),
                shift: shift, line: selectedLine, id: id, name: emp?.name || '',
                groupName: emp?.group || groupName, hours: settings.defaultHours
              };
            });

            try {
              await fetch(SCRIPT_URL, { 
                method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) 
              });
              
              const newSaved = new Set(localSavedIds);
              settings.selectedIds.forEach(id => newSaved.add(id));
              setLocalSavedIds(newSaved);
              
              setStatus({ type: 'success', msg: `บันทึกกลุ่ม ${groupName} (${payload.length} คน) เรียบร้อย` });
              setGroupState(p => ({ ...p, [groupId]: { ...p[groupId], selectedIds: [] } }));
              if(onRefresh) onRefresh();
            } catch (e) {
              setStatus({ type: 'error', msg: "ไม่สามารถบันทึกข้อมูลได้ โปรดลองอีกครั้ง" });
            } finally {
              setSaving(false);
            }
          };

          return (
            <div className="w-full max-w-[1920px] mx-auto space-y-6 animate-in fade-in duration-500 pb-20">
              <div className="w-full mx-auto bg-white rounded-[2rem] shadow-2xl p-4 sm:p-6 md:p-10 border border-white">
                <div className="flex flex-col lg:flex-row justify-between mb-10 gap-6 lg:gap-8">
                  <div className="flex items-center gap-4 sm:gap-5">
                    <div className="bg-orange-600 p-3 sm:p-4 rounded-[1.2rem] sm:rounded-[1.5rem] shadow-xl shadow-orange-200 transform hover:rotate-6 transition-transform">
                      <i className="fa-regular fa-clock text-white text-[24px] sm:text-[32px]"></i>
                    </div>
                    <div>
                      <h1 className="text-xl sm:text-2xl font-black italic tracking-tighter text-slate-800 uppercase leading-none">OT Dashboard V6.3</h1>
                      <div className="flex items-center gap-2 mt-2 sm:mt-3">
                        <div className="w-2 h-2 sm:w-2.5 sm:h-2.5 bg-emerald-500 rounded-full animate-pulse shadow-sm"></div>
                        <p className="text-[9px] sm:text-[10px] font-bold text-slate-400 uppercase italic tracking-widest text-emerald-600">Syncing with Grand Summary</p>
                      </div>
                    </div>
                  </div>

                  <div className="flex flex-col sm:flex-row flex-wrap items-center gap-3 sm:gap-4 w-full lg:w-auto">
                    <div className="flex items-center gap-3 bg-slate-50 p-2.5 rounded-2xl border border-slate-200 px-4 shadow-inner w-full sm:flex-1 min-w-[200px]">
                      <i className="fa-solid fa-search text-slate-400"></i>
                      <input 
                          type="text" placeholder="ค้นหารหัส หรือ ชื่อพนักงาน..." 
                          value={searchTerm} onChange={e => setSearchTerm(e.target.value)} 
                          className="bg-transparent border-none text-[13px] font-bold outline-none text-slate-800 w-full" 
                      />
                    </div>
                    <div className="flex w-full sm:w-auto justify-between gap-3">
                        <div className="flex flex-1 sm:flex-none items-center gap-3 bg-slate-50 p-2.5 rounded-2xl border border-slate-200 px-5 shadow-inner">
                        <i className="fa-regular fa-calendar text-orange-600 text-lg"></i>
                        <input type="date" value={targetDate} onChange={e => setTargetDate(e.target.value)} className="bg-transparent border-none text-[13px] font-black outline-none cursor-pointer text-slate-800 w-full" />
                        </div>
                        <button onClick={onRefresh} className="sm:hidden p-3.5 bg-white text-slate-400 hover:text-orange-600 rounded-2xl border shadow-sm active:scale-90 hover:border-orange-200"><i className="fa-solid fa-arrows-rotate text-xl"></i></button>
                    </div>

                    <div className="flex w-full sm:w-auto gap-3 overflow-x-auto hide-scrollbar">
                        <div className="bg-slate-50 p-1.5 rounded-2xl flex border border-slate-200 shadow-inner shrink-0">
                        {['Shift A', 'Shift B'].map(s => (
                            <button key={s} onClick={() => setShift(s)} className={`px-4 sm:px-8 py-2.5 rounded-[1rem] text-[10px] sm:text-[11px] font-black transition-all ${shift === s ? 'bg-white text-orange-600 shadow-md' : 'text-slate-400'}`}>{s}</button>
                        ))}
                        </div>
                        <div className="bg-slate-50 p-1.5 rounded-2xl flex gap-1.5 border border-slate-200 shadow-inner shrink-0">
                        <span className="px-2 sm:px-3 text-[9px] sm:text-[10px] font-black text-slate-400 uppercase flex items-center italic">Line</span>
                        {[1, 2, 3, 4, 5, 6].map(l => (
                            <button key={l} onClick={() => setSelectedLine(l)} className={`w-8 h-8 sm:w-10 sm:h-10 rounded-xl text-[11px] sm:text-[13px] font-black transition-all border ${selectedLine === l ? 'bg-white text-orange-600 shadow-md border-orange-200 scale-110' : 'text-slate-400 border-transparent hover:bg-white/50'}`}>{l}</button>
                        ))}
                        </div>
                        <button onClick={onRefresh} className="hidden sm:block p-3.5 bg-white text-slate-400 hover:text-orange-600 rounded-2xl border shadow-sm active:scale-90 hover:border-orange-200 shrink-0"><i className="fa-solid fa-arrows-rotate text-xl"></i></button>
                    </div>
                  </div>
                </div>

                {status && (
                  <div className={`mb-10 p-4 sm:p-5 rounded-[2rem] flex flex-col sm:flex-row items-start sm:items-center gap-4 sm:gap-5 border shadow-sm animate-in slide-in-from-top-4 duration-500 ${status.type === 'success' ? 'bg-emerald-50 text-emerald-800 border-emerald-100' : 'bg-rose-50 text-rose-800 border-rose-100'}`}>
                    <div className={`p-2.5 rounded-full ${status.type === 'success' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'} self-center`}>
                      <i className={`fa-solid ${status.type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation'} text-2xl`}></i>
                    </div>
                    <div className="text-center sm:text-left w-full sm:w-auto">
                      <p className="text-[14px] font-black uppercase italic leading-none">สถานะ</p>
                      <p className="text-[11px] font-bold opacity-80 mt-1.5">{status.msg}</p>
                    </div>
                    <button onClick={() => setStatus(null)} className="absolute top-4 right-4 sm:static sm:ml-auto text-slate-400 p-2"><i className="fa-solid fa-xmark text-xl"></i></button>
                  </div>
                )}

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8">
                  {ORIGINAL_UI_GROUPS.map(group => {
                    const baseList = group.isGlobal ? filteredActiveEmployees : productionEmps;
                    const members = baseList.filter(u => {
                      const targetStr = [u.group, u.role, u.role2, u.role3, u.role4, u.fullRowStr].join(' ').toLowerCase();
                      const matchesGroup = group.keywords.some(k => targetStr.includes(k.toLowerCase()));
                      const matchesSearch = !searchTerm || String(u.id).toLowerCase().includes(searchTerm.toLowerCase()) || String(u.name).toLowerCase().includes(searchTerm.toLowerCase());
                      return matchesGroup && matchesSearch;
                    });

                    const settings = groupState[group.id];
                    const available = members.filter(m => !localSavedIds.has(m.id));
                    const isAllSelected = available.length > 0 && settings.selectedIds.length === available.length;
                    const totalHours = settings.selectedIds.length * settings.defaultHours;

                    return (
                      <div key={group.id} className="bg-white rounded-[2rem] shadow-sm border border-slate-100 flex flex-col h-[380px] overflow-hidden transition-all hover:shadow-md">
                        <div className="p-4 border-b flex items-center justify-between bg-slate-50/30">
                          <div>
                            <h3 className="text-sm font-black text-slate-800 leading-none">{group.name}</h3>
                            <span className="text-[9px] text-orange-500 font-bold uppercase tracking-wider">{group.sub}</span>
                          </div>
                          <div className="flex items-center gap-2">
                            <div className="flex items-center bg-orange-100 border border-orange-200 rounded-xl px-2 py-1">
                              <span className="text-[9px] font-black mr-1 text-orange-700 italic">ชม.</span>
                              <input 
                                type="number" step="0.5" value={settings.defaultHours} 
                                onChange={e => setGroupState(p => ({...p, [group.id]: {...p[group.id], defaultHours: parseFloat(e.target.value) || 0}}))}
                                className="w-8 text-center font-bold text-[11px] bg-transparent outline-none text-slate-800" 
                              />
                            </div>
                            <button 
                              onClick={() => requestSaveGroup(group.id, group.name)} 
                              disabled={settings.selectedIds.length === 0 || saving}
                              className="bg-orange-600 hover:bg-orange-700 text-white text-[10px] font-black px-4 py-2 rounded-xl shadow-sm active:scale-95 transition-all disabled:opacity-20"
                            >
                              {saving ? <i className="fa-solid fa-circle-notch fa-spin"></i> : "บันทึก"}
                            </button>
                          </div>
                        </div>

                        <div className="bg-slate-50/50 px-4 py-2 flex items-center justify-between text-[10px] border-b">
                           <div className="flex items-center gap-2">
                             <button onClick={() => {
                               const next = isAllSelected ? [] : available.map(m => m.id);
                               setGroupState(p => ({...p, [group.id]: {...p[group.id], defaultHours: p[group.id].defaultHours, selectedIds: next}}));
                             }}>
                               <i className={`fa-solid ${isAllSelected ? 'fa-square-check text-orange-600' : 'fa-square text-slate-300'} text-base`}></i>
                             </button>
                             <span className="font-bold text-slate-400 italic uppercase">ID / Employee Name</span>
                           </div>
                           <div className="text-orange-600 font-black bg-white px-2 py-0.5 rounded-lg border border-orange-100 shadow-sm">
                             {totalHours.toFixed(1)} hrs
                           </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-2 custom-scrollbar bg-white">
                          {members.length > 0 ? (
                            members.map(m => {
                              const isSaved = localSavedIds.has(m.id);
                              const isSelected = settings.selectedIds.includes(m.id);
                              const globalEmpInfo = globalEmployees?.find(ge => String(ge.id) === String(m.id));
                              const existingOTVal = globalEmpInfo?.otByDate?.[targetDate];
                              const hasExistingOT = parseFloat(existingOTVal) > 0;

                              return (
                                <div 
                                  key={m.id} 
                                  onClick={() => !isSaved && handleToggleSelect(group.id, m.id)} 
                                  className={`flex items-center p-2.5 rounded-xl border-b border-slate-50 transition-all ${isSaved ? 'opacity-40 bg-slate-50' : 'cursor-pointer hover:bg-slate-50'} ${isSelected ? 'bg-orange-50/40' : ''}`}
                                >
                                  <div className="w-[10%] flex justify-center">
                                    <i className={`fa-solid ${isSaved ? 'fa-lock text-slate-400 text-xs' : isSelected ? 'fa-square-check text-orange-600 text-base' : 'fa-square text-slate-200 text-base'}`}></i>
                                  </div>
                                  <div className="w-[70%] px-2">
                                    <div className="text-[11px] font-black text-slate-800 leading-none flex items-center">
                                        {m.id}
                                        {hasExistingOT && !isSaved && (
                                            <span className="ml-2 px-1.5 py-0.5 rounded text-[9px] bg-blue-50 text-blue-600 border border-blue-100 shadow-sm flex items-center gap-1">
                                                <i className="fa-solid fa-clock"></i> {existingOTVal} ชม.
                                            </span>
                                        )}
                                    </div>
                                    <div className="text-[10px] text-slate-500 truncate mt-1">{m.name}</div>
                                  </div>
                                  <div className="w-[20%] text-right">
                                    {isSaved && <span className="text-[8px] font-black text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded uppercase border border-emerald-100 flex items-center justify-center gap-1"><i className="fa-solid fa-check"></i> SAVED</span>}
                                  </div>
                                </div>
                              );
                            })
                          ) : (
                            <div className="h-full flex flex-col items-center justify-center text-slate-300 opacity-50 italic py-10">
                              <i className="fa-solid fa-users text-2xl mb-2"></i>
                              <p className="text-[10px] uppercase font-black">{searchTerm ? "ไม่พบผลการค้นหา" : "ไม่พบพนักงานในกะ/ไลน์นี้"}</p>
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Confirm Dialog Modal */}
                {confirmDialog.isOpen && (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                        <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden animate-in zoom-in-95 duration-200 border border-slate-100">
                            <div className="bg-orange-50 p-6 text-center border-b border-orange-100">
                                <div className="w-16 h-16 bg-white text-orange-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-4 shadow-sm">
                                    <i className="fa-solid fa-file-signature"></i>
                                </div>
                                <h3 className="text-xl font-black text-slate-800">ยืนยันการบันทึก OT</h3>
                            </div>
                            <div className="p-6">
                                <p className="text-slate-600 text-[13px] font-bold text-center mb-6 leading-relaxed">
                                    คุณต้องการบันทึกข้อมูลล่วงเวลา (OT) ให้กับกลุ่ม <span className="text-orange-600 font-black">{confirmDialog.groupName}</span> ใช่หรือไม่?
                                </p>
                                <div className="bg-slate-50 rounded-xl p-4 space-y-3 mb-8 border border-slate-100">
                                    <div className="flex justify-between items-center text-[12px]">
                                        <span className="font-bold text-slate-500">จำนวนพนักงาน</span>
                                        <span className="font-black text-slate-800">{groupState[confirmDialog.groupId].selectedIds.length} คน</span>
                                    </div>
                                    <div className="flex justify-between items-center text-[12px]">
                                        <span className="font-bold text-slate-500">ชั่วโมง OT / คน</span>
                                        <span className="font-black text-orange-600">{groupState[confirmDialog.groupId].defaultHours} ชม.</span>
                                    </div>
                                    <div className="border-t border-slate-200 pt-3 flex justify-between items-center text-[12px]">
                                        <span className="font-bold text-slate-500">วันที่ทำรายการ</span>
                                        <span className="font-black text-slate-800">{formatThaiDate(targetDate)}</span>
                                    </div>
                                </div>
                                <div className="flex gap-3">
                                    <button 
                                        onClick={() => setConfirmDialog({ isOpen: false, groupId: null, groupName: '' })} 
                                        className="flex-1 bg-white text-slate-500 border border-slate-200 py-3 rounded-[1rem] font-black hover:bg-slate-50 transition-colors"
                                    >
                                        ยกเลิก
                                    </button>
                                    <button 
                                        onClick={handleSaveGroupConfirmed} 
                                        className="flex-1 bg-orange-600 text-white py-3 rounded-[1rem] font-black hover:bg-orange-700 shadow-md shadow-orange-200 transition-all flex items-center justify-center gap-2"
                                    >
                                        <i className="fa-solid fa-check"></i> ยืนยันบันทึก
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                )}
              </div>
            </div>
          );
        };

        const MainApp = () => {
            const [view, setView] = useState('dashboard');
            const [employees, setEmployees] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedLine, setSelectedLine] = useState('LINE 2');
            const [activeShift, setActiveShift] = useState('Shift A');
            const [otPass, setOtPass] = useState('');
            const [isOtAuth, setIsOtAuth] = useState(false);
            
            const fetchInterval = useRef(null);

            useEffect(() => {
                let authTimeout;
                if (isOtAuth) {
                    authTimeout = setTimeout(() => {
                        setIsOtAuth(false);
                        setOtPass('');
                    }, 120000); 
                }
                return () => { if (authTimeout) clearTimeout(authTimeout); };
            }, [isOtAuth]);

            const fetchDashboardData = async (isSilent = false) => {
                if (!isSilent) setLoading(true);
                try {
                    const CSV_ATT_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQguGoF3kiHKMbAW_IHJaxIO0cAr4-6CktfRLZRYhf4z2WvVC_zmiZp6AH8hLpX_aNZNWpJuWfiBcYc/pub?gid=505123189&single=true&output=csv`;
                    
                    const textAtt = await fetchWithFallback(CSV_ATT_URL);
                    const rowsAtt = textAtt.replace(/\r/g, '').split('\n')
                        .filter(r => r.trim())
                        .map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/"/g, '')));
                    
                    const headersAtt = rowsAtt[0];

                    const CSV_OT_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQguGoF3kiHKMbAW_IHJaxIO0cAr4-6CktfRLZRYhf4z2WvVC_zmiZp6AH8hLpX_aNZNWpJuWfiBcYc/pub?gid=504388308&single=true&output=csv`;
                    const textOT = await fetchWithFallback(CSV_OT_URL);
                    const rowsOT = textOT.replace(/\r/g, '').split('\n')
                        .filter(r => r.trim())
                        .map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/"/g, '')));
                    
                    const headersOT = rowsOT[0];

                    const parseUnifiedDate = (h) => {
                        const trimmed = String(h).trim();
                        if (!trimmed) return null;

                        const match = trimmed.match(/(\d{1,4})[-/.](\d{1,2})[-/.](\d{1,4})/);
                        if (match) {
                            let num1 = parseInt(match[1], 10);
                            let num2 = parseInt(match[2], 10);
                            let num3 = parseInt(match[3], 10);
                            let y, m, d;
                            if (num1 > 1000) { y = num1; m = num2; d = num3; } 
                            else if (num3 > 1000) { y = num3; d = num1; m = num2; if (m > 12 && d <= 12) { m = num1; d = num2; } } 
                            else { y = num3 + 2000; d = num1; m = num2; if (m > 12 && d <= 12) { m = num1; d = num2; } }
                            if (y > 2500) y -= 543;
                            return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                        }

                        const thaiMonths = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค.", "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
                        for (let i = 0; i < thaiMonths.length; i++) {
                            if (trimmed.includes(thaiMonths[i])) {
                                const m = (i % 12) + 1;
                                const dMatch = trimmed.match(/\d{1,2}/);
                                const yMatch = trimmed.match(/\d{4}/);
                                if (dMatch && yMatch) {
                                    let y = parseInt(yMatch[0], 10);
                                    if (y > 2500) y -= 543;
                                    const d = parseInt(dMatch[0], 10);
                                    return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                                }
                            }
                        }

                        const dObj = new Date(trimmed);
                        if (!isNaN(dObj.getTime()) && trimmed.match(/[a-zA-Z]/)) {
                             let y = dObj.getFullYear();
                             if (y > 2500) y -= 543;
                             return `${y}-${String(dObj.getMonth() + 1).padStart(2, '0')}-${String(dObj.getDate()).padStart(2, '0')}`;
                        }
                        return null;
                    };

                    const attDateCols = [];
                    const seenAttDates = new Set();
                    headersAtt.forEach((h, idx) => {
                        const ymd = parseUnifiedDate(h);
                        if (ymd && !seenAttDates.has(ymd)) {
                            seenAttDates.add(ymd);
                            attDateCols.push({ idx, ymd });
                        }
                    });

                    let otHeaderRowIdx = 0;
                    let idIdxOT = -1;
                    let dateIdxOT = -1;
                    let hoursIdxOT = -1;
                    
                    for (let i = 0; i < Math.min(5, rowsOT.length); i++) {
                        const hRow = rowsOT[i].map(h => String(h).toLowerCase());
                        const tempIdx = hRow.findIndex(h => ["รหัส", "id", "工号", "emp"].some(k => h.includes(k)));
                        if (tempIdx !== -1) {
                            otHeaderRowIdx = i;
                            idIdxOT = tempIdx;
                            dateIdxOT = hRow.findIndex(h => ["วัน", "date", "เวลา"].some(k => h.includes(k)));
                            hoursIdxOT = hRow.findIndex(h => ["ชั่วโมง", "ot", "hour", "ชม"].some(k => h.includes(k)));
                            break;
                        }
                    }

                    const otMap = {};
                    if (idIdxOT !== -1) {
                        if (dateIdxOT !== -1 && hoursIdxOT !== -1) {
                            rowsOT.slice(otHeaderRowIdx + 1).forEach(r => {
                                const eid = r[idIdxOT] ? String(r[idIdxOT]).trim() : '';
                                const rawDate = r[dateIdxOT] ? String(r[dateIdxOT]).trim() : '';
                                const rawHours = r[hoursIdxOT] ? String(r[hoursIdxOT]).trim() : '';
                                if (!eid || !rawDate) return;
                                const ymd = parseUnifiedDate(rawDate);
                                if (ymd) {
                                    if (!otMap[eid]) otMap[eid] = {};
                                    const currentVal = parseFloat(otMap[eid][ymd]) || 0;
                                    const addVal = parseFloat(rawHours) || 0;
                                    otMap[eid][ymd] = (currentVal + addVal).toString();
                                }
                            });
                        } else {
                            const otDateCols = [];
                            const seenOtDates = new Set();
                            const headerRow = rowsOT[otHeaderRowIdx] || [];
                            for (let colIdx = 0; colIdx < headerRow.length; colIdx++) {
                                if (colIdx === idIdxOT) continue;
                                if (headerRow[colIdx]) {
                                    const ymd = parseUnifiedDate(headerRow[colIdx]);
                                    if (ymd && !seenOtDates.has(ymd)) {
                                        seenOtDates.add(ymd);
                                        otDateCols.push({ colIdx, ymd: ymd });
                                    }
                                }
                            }

                            rowsOT.slice(otHeaderRowIdx + 1).forEach(r => {
                                const eid = r[idIdxOT] ? String(r[idIdxOT]).trim() : '';
                                if (!eid) return;
                                if (!otMap[eid]) otMap[eid] = {};
                                otDateCols.forEach(col => {
                                    const val = r[col.colIdx] ? String(r[col.colIdx]).trim() : '0';
                                    if (val !== '0' && val !== '' && val !== '-') {
                                        otMap[eid][col.ymd] = val;
                                    }
                                });
                            });
                        }
                    }
                    
                    const getColIndex = (headers, keywords) => headers.findIndex(h => keywords.some(k => h.toLowerCase().includes(k.toLowerCase())));
                    
                    let idIdx = getColIndex(headersAtt, ["รหัส", "id", "工号"]);
                    if (idIdx === -1) idIdx = 0;
                    let nameIdx = getColIndex(headersAtt, ["ชื่อ", "name", "姓名"]);
                    if (nameIdx === -1) nameIdx = 1;
                    let lineIdx = getColIndex(headersAtt, ["ไลน์", "line", "线"]);
                    if (lineIdx === -1) lineIdx = 2;
                    let groupIdx = getColIndex(headersAtt, ["กลุ่ม", "section", "group", "แผนก"]);
                    if (groupIdx === -1) groupIdx = 3;
                    let roleIdx = getColIndex(headersAtt, ["ตำแหน่ง", "role", "ระดับ", "หน้าที่"]);
                    if (roleIdx === -1) roleIdx = 5;
                    
                    let role2Idx = getColIndex(headersAtt, ["role2", "ตำแหน่ง2", "ทักษะ2"]);
                    let role3Idx = getColIndex(headersAtt, ["role3", "ตำแหน่ง3", "ทักษะ3"]);
                    let role4Idx = getColIndex(headersAtt, ["role4", "ตำแหน่ง4", "ทักษะ4"]);
                    
                    let shiftIdx = getColIndex(headersAtt, ["shift", "กะ", "กะการทำงาน"]);
                    let contractIdx = getColIndex(headersAtt, ["contract", "สัญญา", "สังกัด", "company", "บริษัท", "สังกัด(บริษัท)"]);
                    let isKeyIdx = getColIndex(headersAtt, ["iskey", "key", "สำคัญ"]);
                    let noteIdx = getColIndex(headersAtt, ["note", "หมายเหตุ", "remark", "หมายเหตุ", "note"]);
                    let picIdx = getColIndex(headersAtt, ["picture", "รูป", "image", "img", "รูปภาพ"]);

                    const emps = rowsAtt.slice(1).map(r => {
                        const eid = r[idIdx] ? String(r[idIdx]).trim() : '';
                        const statusesByDate = {};
                        const shiftsByDate = {};
                        let firstResignedDate = null;
                        
                        const sortedAttDateCols = [...attDateCols].sort((a,b) => new Date(a.ymd) - new Date(b.ymd));

                        sortedAttDateCols.forEach(col => {
                            const cellStatus = r[col.idx] ? String(r[col.idx]).trim() : '';
                            let fStatus = 'ไม่มีข้อมูล';
                            let dShift = 'ไม่มีข้อมูล';
                            
                            if (cellStatus !== '' && cellStatus !== '-') {
                                const sStatus = cellStatus.toLowerCase();
                                if (sStatus.includes('day') || sStatus.includes('เช้า') || sStatus.includes('a-') || sStatus.startsWith('a')) {
                                    dShift = 'Shift A';
                                } else if (sStatus.includes('night') || sStatus.includes('ดึก') || sStatus.includes('b-') || sStatus.startsWith('b')) {
                                    dShift = 'Shift B';
                                }

                                if (sStatus.includes('ขาด') || sStatus.includes('absent')) fStatus = 'ขาดงาน';
                                else if (sStatus.includes('ป่วย') || sStatus.includes('sick')) fStatus = 'ลาป่วย';
                                else if (sStatus.includes('กิจ') || sStatus.includes('personal')) fStatus = 'ลากิจ';
                                else if (sStatus.includes('พักร้อน') || sStatus.includes('vacation')) fStatus = 'ลาพักร้อน';
                                else if (sStatus.includes('สาย') || sStatus.includes('late')) fStatus = 'สาย';
                                else if (sStatus.includes('ออก') || sStatus.includes('resigned')) fStatus = 'ลาออก';
                                else if (sStatus.includes('อื่น') || sStatus.includes('other')) fStatus = 'ลาอื่นๆ';
                                else if (sStatus.includes('ปกติ') || sStatus.includes('present') || !isNaN(cellStatus) || sStatus === 'p') fStatus = 'มาปกติ';
                                else fStatus = 'มาปกติ';
                            }
                            
                            if (fStatus === 'ลาออก' && !firstResignedDate) firstResignedDate = col.ymd;
                            statusesByDate[col.ymd] = fStatus;
                            shiftsByDate[col.ymd] = dShift;
                        });

                        let groupVal = r[groupIdx] ? String(r[groupIdx]).trim() : '';
                        const sGroup = groupVal.toLowerCase();
                        if (sGroup.includes('前装') || sGroup.includes('front') || sGroup.includes('input') || sGroup.includes('หัวไลน์')) groupVal = 'หัวไลน์';
                        else if (sGroup.includes('装配') || sGroup.includes('middle') || sGroup.includes('กลางไลน์')) groupVal = 'กลางไลน์';
                        else if (sGroup.includes('测试') || sGroup.includes('cooling') || sGroup.includes('testing') || sGroup.includes('test') || sGroup.includes('ห้องทดสอบ')) groupVal = 'ห้องทดสอบ';
                        else if (sGroup.includes('后装') || sGroup.includes('final') || sGroup.includes('end') || sGroup.includes('ท้ายไลน์')) groupVal = 'ท้ายไลน์';

                        const fullRowStr = r.join(' ').toLowerCase();
                        const keyVal = isKeyIdx !== -1 && r[isKeyIdx] ? String(r[isKeyIdx]).trim() : '';
                        const noteVal = noteIdx !== -1 && r[noteIdx] ? String(r[noteIdx]).trim().toLowerCase() : '';
                        const isResignedFromNote = noteVal.includes('resign') || noteVal.includes('ลาออก');
                        const picUrl = picIdx !== -1 && r[picIdx] ? String(r[picIdx]).trim() : '';
                        const contractVal = contractIdx !== -1 && r[contractIdx] ? String(r[contractIdx]).trim() : '-';

                        const r2 = role2Idx !== -1 && r[role2Idx] ? String(r[role2Idx]).trim() : '';
                        const r3 = role3Idx !== -1 && r[role3Idx] ? String(r[role3Idx]).trim() : '';
                        const r4 = role4Idx !== -1 && r[role4Idx] ? String(r[role4Idx]).trim() : '';

                        const shiftCell = shiftIdx !== -1 && r[shiftIdx] 
                            ? String(r[shiftIdx]).trim().toUpperCase() 
                            : (r[6] ? String(r[6]).trim().toUpperCase() : '');
                            
                        let empShift = 'Shift A';
                        if (shiftCell === 'B' || shiftCell.includes('SHIFT B') || shiftCell.includes('กะ B') || shiftCell.includes('กะB') || shiftCell.includes('NIGHT') || shiftCell === 'N' || shiftCell.includes('ดึก')) {
                            empShift = 'Shift B';
                        } else if (shiftCell === 'A' || shiftCell.includes('SHIFT A') || shiftCell.includes('กะ A') || shiftCell.includes('กะA') || shiftCell.includes('DAY') || shiftCell === 'D' || shiftCell.includes('เช้า')) {
                            empShift = 'Shift A';
                        }

                        return {
                            id: eid, name: r[nameIdx] ? String(r[nameIdx]).trim() : '', line: r[lineIdx] ? String(r[lineIdx]).trim() : '',
                            group: groupVal, role: r[roleIdx] ? String(r[roleIdx]).trim() : '', 
                            role2: r2, role3: r3, role4: r4, contract: contractVal,
                            isKey: keyVal, shift: empShift, fullRowStr: fullRowStr, isResignedFromNote: isResignedFromNote,
                            picture: picUrl, status: 'ไม่มีข้อมูล', statusesByDate: statusesByDate, shiftsByDate: shiftsByDate,
                            otByDate: otMap[eid] || {}, resignedDate: firstResignedDate
                        };
                    }).filter(e => e.id !== '');
                    
                    setEmployees(emps);
                } catch (e) { 
                    console.warn("Data sync skipped or failed:", e.message); 
                } finally { 
                    setLoading(false); 
                }
            };

            useEffect(() => {
                fetchDashboardData();
                fetchInterval.current = setInterval(() => { fetchDashboardData(true); }, 60000); // อัปเดตทุก 1 นาที (60,000 ms) เพื่อลดดีเลย์แต่ไม่ถี่เกินไป
                return () => { if (fetchInterval.current) clearInterval(fetchInterval.current); };
            }, [view]);

            const handleOTClick = () => {
                setOtPass('');
                setView('ot');
            };

            const checkPass = () => {
                if (otPass === OT_ACCESS_PASSWORD) { setIsOtAuth(true); } 
                else { alert('รหัสผ่านไม่ถูกต้อง'); }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="glass-nav border-b sticky top-0 z-50 flex flex-wrap xl:flex-nowrap items-center justify-between px-4 lg:px-6 py-3 xl:py-0 xl:h-16 gap-y-3 shadow-sm">
                        <div className="flex items-center gap-3 shrink-0">
                            <div className="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-100"><i className="fa-solid fa-industry text-base"></i></div>
                            <div>
                                <h1 className="text-base font-black italic uppercase text-slate-800 tracking-tighter leading-none">Haier A01 Suite</h1>
                                <p className="text-[9px] font-black text-slate-400 tracking-widest uppercase mt-0.5">Production Management</p>
                            </div>
                        </div>

                        <div className="flex items-center justify-start sm:justify-center gap-2 order-last xl:order-none w-full xl:w-auto overflow-x-auto pb-2 xl:pb-0 hide-scrollbar shrink-0">
                            {[
                                { id: 'dashboard', l: 'หน้าหลัก', zh: '首页', i: 'fa-chart-pie', act: () => setView('dashboard') },
                                { id: 'attendance', l: 'เช็คเวลา', zh: '考勤', i: 'fa-user-check', act: () => setView('attendance') },
                                { id: 'ot', l: 'บันทึก OT', zh: '加班记录', i: 'fa-clock', act: handleOTClick },
                                { id: 'key-positions', l: 'ตำแหน่งสำคัญ', zh: '关键岗位', i: 'fa-star', act: () => setView('key-positions') },
                                { id: 'leave-stats', l: 'สถิติการลา', zh: '请假统计', i: 'fa-calendar-minus', act: () => setView('leave-stats') },
                                { id: 'rba60', l: 'RBA 60', zh: '工时管控', i: 'fa-business-time', act: () => setView('rba60') }
                            ].map(t => (
                                <button key={t.id} onClick={t.act} className={`whitespace-nowrap shrink-0 px-3 sm:px-4 py-2 rounded-xl text-[11px] sm:text-[12px] font-bold flex items-center gap-2 transition-all border ${view===t.id ? 'bg-blue-50 text-blue-600 border-blue-100 shadow-sm' : 'text-slate-500 hover:bg-slate-50 border-transparent hover:border-slate-200'}`}>
                                    <i className={`fa-solid ${t.i}`}></i> 
                                    <span className="uppercase flex items-center gap-1.5">
                                        {t.l} <span className="text-[10px] font-medium opacity-70 hidden sm:inline-block">{t.zh}</span>
                                    </span>
                                </button>
                            ))}
                        </div>

                        <div className="flex items-center gap-2 sm:gap-3 xl:border-l xl:border-slate-200 xl:pl-6 shrink-0 ml-auto overflow-x-auto hide-scrollbar pb-1 xl:pb-0">
                            <div className="flex bg-slate-100 p-1 rounded-full border border-slate-200 shrink-0">
                                {['Shift A', 'Shift B'].map(s => (
                                    <button key={s} onClick={()=>setActiveShift(s)} className={`whitespace-nowrap px-3 sm:px-4 py-1.5 rounded-full text-[9px] sm:text-[10px] font-black transition-all ${activeShift===s?'bg-white text-blue-600 shadow-sm':'text-slate-400 hover:text-slate-600'}`}>
                                        {s}
                                    </button>
                                ))}
                            </div>
                            <div className="flex bg-slate-100 p-1 rounded-xl border border-slate-200 shrink-0">
                                {['ALL', 'LINE 1', 'LINE 2', 'LINE 3', 'LINE 4', 'LINE 5', 'LINE 6'].map(l => (
                                    <button key={l} onClick={()=>setSelectedLine(l)} className={`whitespace-nowrap px-2 sm:px-3 py-1.5 rounded-lg text-[9px] sm:text-[10px] font-black transition-all ${selectedLine===l?'bg-white text-blue-600 shadow-sm':'text-slate-400 hover:text-slate-600'}`}>{l}</button>
                                ))}
                            </div>
                            {view !== 'ot' && (
                                <button onClick={() => fetchDashboardData()} className="shrink-0 w-8 h-8 sm:w-9 sm:h-9 bg-white border border-slate-200 rounded-xl flex items-center justify-center text-slate-400 hover:text-blue-600 transition-colors shadow-sm active:scale-95"><i className={`fa-solid fa-arrows-rotate text-xs sm:text-sm ${loading?'fa-spin':''}`}></i></button>
                            )}
                        </div>
                    </nav>

                    <main className="flex-1 w-full bg-slate-50">
                        {view === 'dashboard' && <div className="w-full mx-auto p-4 sm:p-6 lg:p-8 2xl:px-12"><DashboardView employees={employees} selectedLine={selectedLine} activeShift={activeShift} isSyncing={loading} onRefresh={fetchDashboardData} /></div>}
                        {view === 'attendance' && <div className="w-full mx-auto p-4 sm:p-6 lg:p-8 2xl:px-12"><AttendanceView employees={employees} /></div>}
                        {view === 'leave-stats' && <div className="w-full mx-auto p-4 sm:p-6 lg:p-8 2xl:px-12"><LeaveStatsView employees={employees} selectedLine={selectedLine} activeShift={activeShift} /></div>}
                        {view === 'key-positions' && <div className="w-full mx-auto p-4 sm:p-6 lg:p-8 2xl:px-12"><KeyPositionsView employees={employees} selectedLine={selectedLine} activeShift={activeShift} /></div>}
                        {view === 'rba60' && <div className="w-full mx-auto p-4 sm:p-6 lg:p-8 2xl:px-12"><Rba60View employees={employees} selectedLine={selectedLine} activeShift={activeShift} /></div>}
                        
                        {view === 'ot' && (
                            !isOtAuth ? (
                                <div className="max-w-md mx-auto mt-20 p-6 sm:p-10 bg-white rounded-[2rem] sm:rounded-[2.5rem] shadow-xl border border-slate-100 text-center animate-in zoom-in-95 duration-300 mx-4">
                                    <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6">
                                        <i className="fa-solid fa-lock"></i>
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-800 mb-2">พื้นที่หวงห้าม</h2>
                                    <p className="text-slate-400 text-sm mb-8 font-bold">กรุณากรอกรหัสผ่านเพื่อบันทึก OT</p>
                                    
                                    <input 
                                        type="password" 
                                        value={otPass} 
                                        onChange={(e) => setOtPass(e.target.value)} 
                                        onKeyDown={(e) => e.key === 'Enter' && checkPass()} 
                                        placeholder="ระบุรหัสผ่าน (Password)" 
                                        className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 font-black text-slate-700 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-100 focus:bg-white transition-all text-center tracking-[0.5em]"
                                        autoFocus
                                    />
                                    
                                    <button 
                                        onClick={checkPass} 
                                        className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all active:scale-95 flex items-center justify-center gap-2"
                                    >
                                        <i className="fa-solid fa-key"></i> ปลดล็อคระบบ
                                    </button>
                                </div>
                            ) : (
                                <OriginalOTSystem globalEmployees={employees} onRefresh={fetchDashboardData} />
                            )
                        )}
                    </main>

                    {view !== 'ot' && (
                        <footer className="py-6 sm:py-8 text-center border-t bg-white">
                            <div className="flex flex-col sm:flex-row items-center justify-center gap-2 sm:gap-6 text-[9px] font-black text-slate-300 italic uppercase tracking-[0.25em]">
                                <span className="flex items-center gap-2"><i className="fa-solid fa-database text-blue-500"></i> HAIER PRODUCTION NETWORK A01</span>
                                <span className="hidden sm:inline">|</span>
                                <span>V6.6 RESPONSIVE RELEASE</span>
                                <span className="hidden sm:inline">|</span>
                                <span>VISUAL MAP MODE ACTIVE</span>
                            </div>
                        </footer>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
