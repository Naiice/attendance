<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haier A01 - WOR MAP & OT System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600;1,700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Hide Scrollbar for Nav */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Factory Map Styles */
        .conveyor-belt {
            background: #1e293b;
            height: 35px;
            position: relative;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 80px);
            border-top: 2px solid #334155;
            border-bottom: 2px solid #0f172a;
        }
        
        .map-card {
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        @keyframes pulse-emerald {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }
        .status-dot { animation: pulse-emerald 2s infinite; }
        
        /* Animation for Conveyor Belt */
        @keyframes belt-bg-slide {
            0% { background-position: 0 0, 10px 10px; }
            100% { background-position: 40px 0, 50px 10px; }
        }
        .conveyor-bg-animate {
            animation: belt-bg-slide 1.5s linear infinite;
        }
        @keyframes items-slide-right {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0%); }
        }
        .animate-conveyor-items {
            width: 200%;
            animation: items-slide-right 12s linear infinite;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        /* Print Styles (Export PDF) */
        @media print {
            body { background-color: #ffffff !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .print-hidden { display: none !important; }
            .glass-nav, footer { display: none !important; }
            main { padding: 0 !important; margin: 0 !important; background: white !important; }
            .shadow-sm, .shadow-md, .shadow-lg, .shadow-xl, .shadow-2xl { box-shadow: none !important; }
            .map-card, .bg-white { border: 1px solid #e2e8f0 !important; }
            @page { size: landscape; margin: 10mm; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const OT_ACCESS_PASSWORD = "admina01";

        const getOriginalLocalDateString = () => {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        };

        const fetchWithFallback = async (url) => {
            const proxyList = [
                url, 
                `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, 
                `https://corsproxy.io/?${encodeURIComponent(url)}` 
            ];

            let lastError;
            for (let i = 0; i < proxyList.length; i++) {
                try {
                    const response = await fetch(proxyList[i]);
                    const text = await response.text();
                    if (text.includes("<!DOCTYPE html>")) throw new Error("Google Sheet requires login (Not published to web)");
                    return text;
                } catch (error) {
                    lastError = error;
                }
            }
            throw lastError || new Error("Failed to fetch data from all sources");
        };

        const STATUS_LEGEND = [
            { label: 'มาปกติ', zh: '正常准时', color: 'text-emerald-500', bg: 'bg-[#22c55e]' },
            { label: 'สาย', zh: '迟到', color: 'text-orange-500', bg: 'bg-[#f97316]' },
            { label: 'ลาป่วย', zh: '病假', color: 'text-slate-400', bg: 'bg-[#94a3b8]' },
            { label: 'ลากิจ', zh: '事假', color: 'text-fuchsia-500', bg: 'bg-[#d946ef]' },
            { label: 'ลาพักร้อน', zh: '年假', color: 'text-purple-500', bg: 'bg-[#a855f7]' }, 
            { label: 'ลาอื่นๆ', zh: '其他', color: 'text-blue-500', bg: 'bg-[#3b82f6]' },
            { label: 'ขาดงาน', zh: '旷工', color: 'text-red-500', bg: 'bg-[#ef4444]' },
            { label: 'ลาออก', zh: '离职', color: 'text-slate-800', bg: 'bg-[#1e293b]' },
            { label: 'ไม่มีข้อมูล', zh: '无数据', color: 'text-slate-400', bg: 'bg-slate-200' }
        ];

        const SECTIONS = [
            { id: 'front', name: 'หัวไลน์', sub: '前装-Input', keywords: ['input', '前装', 'หัวไลน์'] },
            { id: 'middle', name: 'กลางไลน์', sub: '装配-Middle', keywords: ['middle', '装配', 'กลางไลน์'] },
            { id: 'test', name: 'ห้องทดสอบ', sub: '测试房-Cooling', keywords: ['cooling', '测试房', 'ทดสอบ', 'test'] },
            { id: 'final', name: 'ท้ายไลน์', sub: '后装-Final', keywords: ['final', '后装', 'ท้ายไลน์'] }
        ];

        const PersonMapIcon = ({ employee, groupName, tooltipPos = 'top' }) => {
            const status = employee?.status || 'ไม่มีข้อมูล';
            const config = STATUS_LEGEND.find(l => status.includes(l.label)) || { bg: 'bg-slate-200' };
            const roleName = groupName || employee?.role || employee?.group || 'EMPLOYEE';
            
            const getDirectImageUrl = (url) => {
                if (!url) return null;
                const driveMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
                if (driveMatch && driveMatch[1]) {
                    return `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w200`;
                }
                return url; 
            };

            const directPicUrl = getDirectImageUrl(employee?.picture);

            const getKeyIcon = (val) => {
                if (!val) return null;
                const v = val.toLowerCase();
                if (v.includes('เชื่อม') || v.includes('welding')) return { icon: 'fa-fire', color: 'bg-orange-600', label: 'Welding' };
                if (v.includes('pcb')) return { icon: 'fa-microchip', color: 'bg-cyan-500', label: 'PCB' };
                if (v.includes('แวคคัม') || v.includes('vacuum') || v.includes('เติมสาร')) return { icon: 'fa-gauge-high', color: 'bg-blue-500', label: 'Vacuum' };
                if (v.includes('ทดสอบ') || v.includes('test')) return { icon: 'fa-flask-vial', color: 'bg-purple-500', label: 'Testing' };
                if (v.includes('เครื่องจักร') || v.includes('machine')) return { icon: 'fa-gears', color: 'bg-slate-600', label: 'Machine' };
                if (v.includes('pinching') || v.includes('ปิดผนึก')) return { icon: 'fa-snowflake', color: 'bg-indigo-500', label: 'Pinching (ปิดระบบ)' };
                if (v.includes('new')) return { isEmoji: '🐣', color: 'bg-yellow-100', label: 'New Employee' };
                if (['y', '1', 'yes', 'true'].includes(v)) return { icon: 'fa-star', color: 'bg-yellow-400', label: 'Key Position' };
                return null;
            };

            const keyData = getKeyIcon(employee?.isKey);
            
            const tooltipContainerClass = tooltipPos === 'bottom'
                ? "absolute top-[calc(100%+6px)] left-1/2 -translate-x-1/2 hidden group-hover:flex flex-col items-center z-[100] pointer-events-none drop-shadow-2xl"
                : "absolute bottom-[calc(100%+6px)] left-1/2 -translate-x-1/2 hidden group-hover:flex flex-col items-center z-[100] pointer-events-none drop-shadow-2xl";

            const arrowClass = tooltipPos === 'bottom'
                ? "w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-b-[6px] border-b-[#0f172a]"
                : "w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[6px] border-t-[#0f172a]";

            return (
                <div className="relative group m-[1px] hover:z-[100]">
                    <div className={`w-[22px] h-[22px] rounded-md ${config.bg} flex items-center justify-center shadow-sm cursor-pointer relative`}>
                        <i className="fa-solid fa-user text-white text-[11px]"></i>
                        {keyData && (
                            <div className={`absolute -top-2 -right-2 w-[17px] h-[17px] ${keyData.color} rounded-full flex items-center justify-center shadow-md border border-white z-10 overflow-hidden`}>
                                {keyData.isEmoji ? (
                                    <span className="text-[11px] leading-none">{keyData.isEmoji}</span>
                                ) : (
                                    <i className={`fa-solid ${keyData.icon} text-white text-[9px]`}></i>
                                )}
                            </div>
                        )}
                    </div>
                    
                    <div className={tooltipContainerClass}>
                        {tooltipPos === 'bottom' && <div className={arrowClass}></div>}
                        <div className="bg-[#0f172a] text-white text-center px-4 py-3 rounded-xl shadow-2xl min-w-[140px] border border-slate-700 flex flex-col items-center">
                            {directPicUrl ? (
                                <img 
                                    src={directPicUrl} 
                                    alt={employee.name} 
                                    className="w-12 h-12 rounded-full object-cover mb-2 border-2 border-slate-600 bg-slate-800 shadow-sm"
                                    onError={(e) => { 
                                        e.target.onerror = null; 
                                        e.target.style.display = 'none'; 
                                        e.target.nextSibling.style.display = 'flex'; 
                                    }} 
                                />
                            ) : null}
                            <div className={`w-12 h-12 rounded-full mb-2 border-2 border-slate-600 bg-slate-800 items-center justify-center shadow-sm ${directPicUrl ? 'hidden' : 'flex'}`}>
                                <i className="fa-solid fa-user text-slate-400 text-lg"></i>
                            </div>
                            
                            <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">
                                {keyData && (keyData.isEmoji || <i className={`fa-solid ${keyData.icon} text-yellow-400 mr-1`}></i>)}
                                {roleName}
                            </p>
                            <p className="text-[13px] font-bold whitespace-nowrap">{employee?.name || 'ไม่ระบุชื่อ'}</p>
                            <div className="flex items-center justify-center gap-1.5 mt-1.5">
                                <div className={`w-1.5 h-1.5 rounded-full ${config.bg}`}></div>
                                <p className="text-[10px] text-slate-300">{status}</p>
                            </div>
                            {keyData && keyData.label && (
                                <div className="mt-1 pt-1 border-t border-slate-700 w-full">
                                    <span className="text-[8px] text-slate-400 uppercase font-bold tracking-tighter">Skill: {keyData.label}</span>
                                </div>
                            )}
                        </div>
                        {tooltipPos === 'top' && <div className={arrowClass}></div>}
                    </div>
                </div>
            );
        };

        const CustomDashboardDatePicker = ({ rawDate, setRawDate, availableDates }) => {
            const [isOpen, setIsOpen] = React.useState(false);
            const [viewDate, setViewDate] = React.useState(new Date(rawDate));
            const ref = React.useRef(null);

            React.useEffect(() => {
                const handleClickOutside = (event) => {
                    if (ref.current && !ref.current.contains(event.target)) setIsOpen(false);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            React.useEffect(() => { setViewDate(new Date(rawDate)); }, [rawDate]);

            const displayDateStr = () => {
                if(!rawDate) return "";
                const parts = rawDate.split('-');
                if(parts.length !== 3) return rawDate;
                return `${parts[2]}/${parts[1]}/${parts[0]}`;
            };

            const handleSelectDate = (d, m, y) => {
                const newDate = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                setRawDate(newDate);
                setIsOpen(false);
            };

            const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            const daysOfWeek = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];

            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            const changeMonth = (offset) => { setViewDate(new Date(year, month + offset, 1)); };

            const setToday = () => {
                const today = new Date();
                const newDate = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
                setRawDate(newDate);
                setViewDate(today);
                setIsOpen(false);
            };

            const renderDays = () => {
                const days = [];
                for (let i = 0; i < firstDay; i++) {
                    days.push(<div key={`empty-${i}`} className="w-8 h-8"></div>);
                }
                for (let d = 1; d <= daysInMonth; d++) {
                    const checkDate = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const isSelected = rawDate === checkDate;
                    const hasData = availableDates.has(checkDate);

                    days.push(
                        <div key={d} className="relative w-8 h-8 flex items-center justify-center mb-2">
                            <button 
                                onClick={(e) => { e.stopPropagation(); handleSelectDate(d, month + 1, year); }}
                                className={`w-8 h-8 rounded-full flex items-center justify-center text-[13px] font-bold transition-all ${isSelected ? 'bg-[#2563eb] text-white shadow-md' : 'text-slate-700 hover:bg-slate-100'}`}
                            >
                                {d}
                            </button>
                            {hasData && !isSelected && <div className="absolute -bottom-1 w-1 h-1 bg-emerald-500 rounded-full"></div>}
                            {hasData && isSelected && <div className="absolute -bottom-1 w-1 h-1 bg-white/80 rounded-full"></div>}
                        </div>
                    );
                }
                return days;
            };

            return (
                <div className="relative" ref={ref}>
                    <div 
                        onClick={() => setIsOpen(!isOpen)}
                        className="relative bg-[#f8fafc] border border-slate-200 px-4 sm:px-6 py-2.5 rounded-full shadow-sm flex items-center justify-center gap-2 sm:gap-4 cursor-pointer hover:bg-slate-100 transition-colors w-full sm:w-auto"
                    >
                        <i className="fa-regular fa-calendar text-[#ea580c] text-[18px] sm:text-[22px]"></i>
                        <span className="text-[16px] sm:text-[20px] font-black text-[#0369a1] tracking-wide">{displayDateStr()}</span>
                        <i className="fa-regular fa-calendar-days text-slate-800 text-[13px] sm:text-[15px]"></i>
                    </div>

                    {isOpen && (
                        <div className="absolute top-full mt-3 left-1/2 -translate-x-1/2 md:left-auto md:translate-x-0 md:right-0 w-[290px] bg-white rounded-3xl shadow-[0_15px_40px_-10px_rgba(0,0,0,0.2)] border border-slate-100 p-5 z-[100] animate-in fade-in zoom-in-95 duration-200">
                            <div className="flex items-center justify-between mb-4 px-2">
                                <button onClick={(e) => { e.stopPropagation(); changeMonth(-1); }} className="text-slate-400 hover:text-blue-600 transition-colors w-6 h-6 flex items-center justify-center"><i className="fa-solid fa-chevron-left text-sm"></i></button>
                                <div className="text-center leading-tight">
                                    <p className="text-[15px] font-black text-slate-800">{thaiMonths[month]}</p>
                                    <p className="text-[11px] font-bold text-slate-400 mt-0.5">{year}</p>
                                </div>
                                <button onClick={(e) => { e.stopPropagation(); changeMonth(1); }} className="text-slate-400 hover:text-blue-600 transition-colors w-6 h-6 flex items-center justify-center"><i className="fa-solid fa-chevron-right text-sm"></i></button>
                            </div>

                            <div className="grid grid-cols-7 mb-3 text-center">
                                {daysOfWeek.map(d => (
                                    <div key={d} className="text-[11px] font-black text-slate-300">{d}</div>
                                ))}
                            </div>

                            <div className="grid grid-cols-7 place-items-center gap-y-1">
                                {renderDays()}
                            </div>

                            <div className="mt-2 pt-4 border-t border-slate-50 flex items-center justify-between px-2">
                                <div className="flex items-center gap-2">
                                    <div className="w-1.5 h-1.5 bg-emerald-500 rounded-full"></div>
                                    <span className="text-[10px] font-bold text-slate-400">มีข้อมูลในชีต</span>
                                </div>
                                <button onClick={(e) => { e.stopPropagation(); setToday(); }} className="text-[11px] font-black text-[#2563eb] hover:text-blue-800 transition-colors">วันนี้</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const SummaryDashboard = ({ filteredEmps: baseFilteredEmps, employees, rawDate, availableDates, activeShift, STATUS_LEGEND }) => {
            const [dashLine, setDashLine] = useState('ALL');
            
            const filteredEmps = useMemo(() => {
                if (dashLine === 'ALL') return baseFilteredEmps;
                const lineNum = dashLine.replace('LINE ', '').trim();
                const regex = new RegExp(`(^|\\s|\\W)${lineNum}(\\s|\\W|$)`);
                return baseFilteredEmps.filter(e => regex.test((e.line || '').toString().toUpperCase()));
            }, [baseFilteredEmps, dashLine]);

            const totalEmps = filteredEmps.length;
            
            const getHexColor = (bgClass) => {
                const match = bgClass.match(/#([0-9a-fA-F]{6})/);
                return match ? match[0] : '#cbd5e1';
            };
            
            let currentGradientPercent = 0;
            const pieData = STATUS_LEGEND.map(legend => {
                const count = filteredEmps.filter(e => (e.status || 'ไม่มีข้อมูล').includes(legend.label)).length;
                const percent = totalEmps > 0 ? (count / totalEmps) * 100 : 0;
                const hexColor = getHexColor(legend.bg);
                const gradientString = `${hexColor} ${currentGradientPercent}% ${currentGradientPercent + percent}%`;
                currentGradientPercent += percent;
                return { ...legend, count, percent, hexColor, gradientString };
            }).filter(d => d.count > 0);

            const conicGradientStr = `conic-gradient(${pieData.map(d => d.gradientString).join(', ')})`;
            
            const sortedPie = [...pieData].sort((a,b) => b.count - a.count);
            const topPie = sortedPie.length > 0 ? sortedPie[0] : null;
            const secondPie = sortedPie.length > 1 ? sortedPie[1] : null;

            const ORIGINAL_LINES = [1, 2, 3, 4, 5, 6];
            
            const barData = ORIGINAL_LINES.map(lineNum => {
                const regex = new RegExp(`(^|\\s|\\W)${lineNum}(\\s|\\W|$)`);
                const lineEmps = baseFilteredEmps.filter(e => regex.test((e.line || '').toString().toUpperCase()));
                const total = lineEmps.length;
                const present = lineEmps.filter(e => e.status === 'มาปกติ' || e.status === 'สาย').length;
                const percent = total > 0 ? (present/total)*100 : 0;
                return { name: `Line ${lineNum}`, total, present, percent };
            });

            const validBars = barData.filter(b => b.total > 0);
            const sortedBars = [...validBars].sort((a,b) => b.percent - a.percent);
            const topBar = sortedBars.length > 0 ? sortedBars[0] : null;
            const bottomBar = sortedBars.length > 0 ? sortedBars[sortedBars.length - 1] : null;

            const sortedDates = Array.from(availableDates).sort((a,b) => new Date(a) - new Date(b));
            const currentIdx = sortedDates.indexOf(rawDate);
            const trendDates = currentIdx !== -1 
                ? sortedDates.slice(Math.max(0, currentIdx - 6), currentIdx + 1)
                : sortedDates.slice(-7);
            
            const lineNumFilter = dashLine.replace('LINE ', '').trim();
            const lineRegex = new RegExp(`(^|\\s|\\W)${lineNumFilter}(\\s|\\W|$)`);
            
            const trendData = trendDates.map(date => {
                const dayEmps = employees.filter(e => {
                    if (e.isResignedFromNote) return false;
                    if (e.resignedDate && new Date(date) > new Date(e.resignedDate)) return false;
                    if (e.shift !== activeShift) return false;
                    if (dashLine !== 'ALL' && !lineRegex.test((e.line || '').toString().toUpperCase())) return false;
                    return true;
                });
                const pres = dayEmps.filter(e => {
                    const s = e.statusesByDate?.[date] || 'ไม่มีข้อมูล';
                    return s === 'มาปกติ' || s === 'สาย'; 
                }).length;

                const resigns = employees.filter(e => {
                    if (e.shift !== activeShift) return false;
                    if (dashLine !== 'ALL' && !lineRegex.test((e.line || '').toString().toUpperCase())) return false;
                    return e.statusesByDate?.[date] === 'ลาออก' || e.resignedDate === date;
                }).length;

                const tot = dayEmps.length;
                const rate = tot > 0 ? (pres/tot)*100 : 0;
                const displayDate = new Date(date).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
                return { date, displayDate, rate, present: pres, total: tot, resigns };
            });

            const maxRate = 100;
            const minRate = Math.max(0, Math.min(...trendData.map(d => d.rate)) - 10);
            const getX = (index) => (index / (Math.max(1, trendData.length - 1))) * 180;
            const getY = (val) => 100 - ((val - minRate) / (maxRate - minRate || 1)) * 100;
            const polylinePoints = trendData.map((d, i) => `${getX(i)},${getY(d.rate)}`).join(' ');
            const areaPoints = trendData.length > 0 ? `0,100 ${polylinePoints} 180,100` : '';

            const maxResign = Math.max(5, ...trendData.map(d => d.resigns));
            const getResignY = (val) => 100 - (val / maxResign) * 80;
            const resignPolylinePoints = trendData.map((d, i) => `${getX(i)},${getResignY(d.resigns)}`).join(' ');
            const resignAreaPoints = trendData.length > 0 ? `0,100 ${resignPolylinePoints} 180,100` : '';

            const validTrendData = trendData.filter(d => d.rate > 0);

        const Rba60View = ({ employees, selectedLine, activeShift }) => {

                const dates = Object.keys(employees[0].statusesByDate).sort((a, b) => new Date(b) - new Date(a));
                const ranges = [];
                for (let i = 0; i < dates.length; i++) {
                    const end = dates[i];
                    // หาจุดเริ่มต้นของ 7 วันล่าสุด นับจากวันสิ้นสุด
                    const endIndex = Math.min(i + 6, dates.length - 1);
                    const start = dates[endIndex];
                    ranges.push({
                        endDate: end,
                        startDate: start,
                        dates: dates.slice(i, i + 7).reverse()
                    });
                }
                return ranges;
            }, [employees]);

            useEffect(() => {
                if (availableRanges.length > 0 && !selectedRangeEnd) {
                    setSelectedRangeEnd(availableRanges[0].endDate);

            const currentRange = useMemo(() => {
                return availableRanges.find(r => r.endDate === selectedRangeEnd) || availableRanges[0];

            const weekDates = useMemo(() => {

                    if (emp.shift !== activeShift) return false;
                    
                    if (selectedLine !== 'ALL') {
                        const lineNum = selectedLine.replace('LINE ', '').trim();
                        const regex = new RegExp(`(^|\\s|\\W)${lineNum}(\\s|\\W|$)`);
                        if (!regex.test((emp.line || '').toString().toUpperCase())) return false;
                    }

                    if (searchTerm) {
                        const term = searchTerm.toLowerCase().trim();
                        const idMatch = String(emp.id).toLowerCase().includes(term);
                        const nameMatch = String(emp.name).toLowerCase().includes(term);
                        if (!idMatch && !nameMatch) return false;
                    }

                    return true;
                });

                return list.map(emp => {
                    let presentDays = 0;
                    let totalOT = 0;
                    weekDates.forEach(date => {
                        const status = emp.statusesByDate?.[date] || 'ไม่มีข้อมูล';
                        if (status === 'มาปกติ' || status === 'สาย') {
                            presentDays += 1;

                        const ot = parseFloat(emp.otByDate?.[date]) || 0;
                        totalOT += ot;
                    });
                    const normalHours = presentDays * 8;
                    const totalHours = normalHours + totalOT;
                    
                    return { ...emp, presentDays, normalHours, totalOT, totalHours };
                }).sort((a,b) => {

                        </div>

            );

        const DashboardView = ({ employees, selectedLine, activeShift, isSyncing, onRefresh }) => {

            const [searchTerm, setSearchTerm] = useState('');

            const [isSavingAbsent, setIsSavingAbsent] = useState(false);
            const [absentSaveStatus, setAbsentSaveStatus] = useState(null);

            const [presentUpdates, setPresentUpdates] = useState({});
            const [isSavingPresent, setIsSavingPresent] = useState(false);
            const [presentSaveStatus, setPresentSaveStatus] = useState(null);

            const handleShareWeChat = async () => {

                try {
                    const canvas = await window.html2canvas(element, { 
                        scale: 2, 
                        backgroundColor: '#ffffff',
                        useCORS: true
                    });
                    
                    if (actionBtns) actionBtns.style.opacity = '1'; 
                    
                    canvas.toBlob(async (blob) => {
                        try {
                            const item = new ClipboardItem({ 'image/png': blob });

                            alert('✅ แคปเจอร์หน้าจอสำเร็จ!\n\nระบบได้คัดลอกรูปภาพลง "คลิปบอร์ด" แล้ว\nคุณสามารถไปที่หน้าต่างแชทกลุ่ม WeChat แล้วกด "วาง" (Ctrl+V) หรือกดค้างเพื่อส่งรูปได้ทันทีครับ');
                        } catch (err) {
                            const url = URL.createObjectURL(blob);
                            const link = document.createElement('a');
                            link.download = `Haier_A01_Dashboard_${selectedLine.replace(' ', '_')}.png`;
                            link.href = url;
                            link.click();
                            alert('✅ บันทึกรูปภาพสำเร็จ!\n\nระบบได้ดาวน์โหลดรูปภาพลงเครื่องของคุณแล้ว\nคุณสามารถนำรูปภาพนี้ไปส่งในกลุ่ม WeChat ได้เลยครับ');
                        }
                        setIsCapturing(false);
                    }, 'image/png');
                } catch (error) {
                    console.error("Capture error:", error);
                    if (actionBtns) actionBtns.style.opacity = '1';
                    alert("เกิดข้อผิดพลาดในการแคปเจอร์หน้าจอ");
                    setIsCapturing(false);
                }
            };

            useEffect(() => {
                setAbsentUpdates({});
                setAbsentSaveStatus(null);
                setIsSavingAbsent(false);
            }, [rawDate, showAbsentModal]);

                setPresentUpdates({});
                setPresentSaveStatus(null);
                setIsSavingPresent(false);
            }, [rawDate, showPresentModal]);

            const availableDates = useMemo(() => {
                if (!employees.length || !employees[0].statusesByDate) return new Set();
                return new Set(Object.keys(employees[0].statusesByDate));
            }, [employees]);

            useEffect(() => {
                if (availableDates.size > 0 && !availableDates.has(rawDate)) {
                    const sortedDates = Array.from(availableDates).sort((a, b) => new Date(b) - new Date(a));
                    if (sortedDates.length > 0) {
                        setRawDate(sortedDates[0]);
                    }
                }
            }, [availableDates]);

            const dynamicEmployees = useMemo(() => {
                return employees.map(e => ({
                    ...e,
                    status: e.statusesByDate?.[rawDate] || 'ไม่มีข้อมูล'

                    if (e.isResignedFromNote) return false;
                    if (e.resignedDate && new Date(rawDate) > new Date(e.resignedDate)) return false;

            const filtered = dynamicEmployees.filter(e => {

                                            บันทึกสถานะลง Google Sheets
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const AttendanceView = ({ employees }) => {
            const [searchId, setSearchId] = useState('');
            const [searchedEmp, setSearchedEmp] = useState(null);
            
            const payrollCycles = useMemo(() => {
                const now = new Date();
                let m = now.getMonth() + 1; 
                let y = now.getFullYear();
                const cycles = [];
                for(let i=0; i<4; i++){
                    let currentM = m - i;
                    let currentY = y;
                    if(currentM <= 0) { currentM += 12; currentY -= 1; }
                    cycles.push({ 
                        start: `${currentY}-${String(currentM).padStart(2,'0')}-21`,
                        end: `${currentM === 12 ? currentY+1 : currentY}-${String(currentM === 12 ? 1 : currentM+1).padStart(2,'0')}-20`,
                        label: `รอบ 21 ${currentM}/${currentY} - 20 ${currentM === 12 ? 1 : currentM+1}/${currentM === 12 ? currentY+1 : currentY}`
                    });
                }
                return cycles;
            }, []);

            const [selectedCycle, setSelectedCycle] = useState(() => {
                const now = new Date();
                let y = now.getFullYear();
                let m = now.getMonth() + 1;
                let d = now.getDate();
                if (d < 21) { m -= 1; if (m === 0) { m = 12; y -= 1; } }
                const startStr = `${y}-${String(m).padStart(2, '0')}-21`;
                const found = payrollCycles.find(c => c.start === startStr);
                return found ? found.start : payrollCycles[0].start;
            });

            const handleSearch = (e) => {
                if(e) e.preventDefault();
                if (!searchId.trim()) {
                    alert('กรุณากรอกรหัสพนักงานก่อนค้นหา');
                    return;
                }
                
                const cleanSearchId = String(searchId).replace(/\s/g, '');
                const emp = employees.find(e => String(e.id).replace(/\s/g, '') === cleanSearchId);
                
                if (!emp) {
                    alert(`ไม่พบข้อมูลพนักงานรหัส: ${cleanSearchId} \n\nโปรดตรวจสอบรหัสอีกครั้ง (อาจไม่มีข้อมูลในชีตปัจจุบัน)`);
                    setSearchedEmp(null);
                } else {
                    setSearchedEmp(emp);
                }
            };

            const getStats = useMemo(() => {
                if(!searchedEmp) return { normal: 0, late: 0, leave: 0, absent: 0, ot: 0, dayShiftCount: 0, nightShiftCount: 0, details: [] };
                
                const cycle = payrollCycles.find(c => c.start === selectedCycle);
                const start = new Date(cycle.start);
                const end = new Date(cycle.end);
                
                let stats = { normal: 0, late: 0, leave: 0, absent: 0, ot: 0, dayShiftCount: 0, nightShiftCount: 0, details: [] };
                
                const allDates = new Set([
                    ...Object.keys(searchedEmp.statusesByDate || {}),
                    ...Object.keys(searchedEmp.otByDate || {})
                ]);

                allDates.forEach(dateStr => {
                    const d = new Date(dateStr);
                    if(d >= start && d <= end) {
                        if (searchedEmp.resignedDate && d > new Date(searchedEmp.resignedDate)) {
                            return;
                        }
                        
                        const status = searchedEmp.statusesByDate?.[dateStr] || 'ไม่มีข้อมูล';
                        const otValue = parseFloat(searchedEmp.otByDate?.[dateStr]) || 0;
                        
                        if (status !== 'ไม่มีข้อมูล' || otValue > 0) {
                            if(status === 'มาปกติ') stats.normal++;
                            else if(status === 'สาย') stats.late++;
                            else if(status.includes('ลา')) stats.leave++;
                            else if(status === 'ขาดงาน') stats.absent++;
                            
                            const dateShift = searchedEmp.shiftsByDate?.[dateStr];
                            if (dateShift === 'Shift A') stats.dayShiftCount++;
                            else if (dateShift === 'Shift B') stats.nightShiftCount++;
                            
                            stats.ot += otValue;
                            stats.details.push({ date: dateStr, status: status, ot: otValue, shift: dateShift });
                        }
                    }
                });
                
                stats.details.sort((a,b) => new Date(b.date) - new Date(a.date));
                return stats;
            }, [searchedEmp, selectedCycle, payrollCycles]);

            const donutGradientStr = useMemo(() => {
                const totalDays = getStats.normal + getStats.late + getStats.leave + getStats.absent;
                if (totalDays === 0) return 'conic-gradient(#e2e8f0 0% 100%)';
                
                const nPct = (getStats.normal / totalDays) * 100;
                const laPct = (getStats.late / totalDays) * 100;
                const lePct = (getStats.leave / totalDays) * 100;
                const aPct = (getStats.absent / totalDays) * 100;
                
                let current = 0;
                const parts = [];
                if (nPct > 0) { parts.push(`#10b981 ${current}% ${current + nPct}%`); current += nPct; }
                if (laPct > 0) { parts.push(`#f97316 ${current}% ${current + laPct}%`); current += laPct; }
                if (lePct > 0) { parts.push(`#94a3b8 ${current}% ${current + lePct}%`); current += lePct; }
                if (aPct > 0) { parts.push(`#ef4444 ${current}% ${current + aPct}%`); current += aPct; }
                
                return `conic-gradient(${parts.join(', ')})`;
            }, [getStats]);

            return (
                <div className="w-full max-w-[1920px] mx-auto space-y-6 animate-in fade-in duration-500 pb-20">
                    <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 p-6 sm:p-10">
                        <div className="text-center mb-8">

                            </div>
                        </div>

                        <form onSubmit={handleSearch} className="flex flex-col sm:flex-row gap-3 max-w-xl mx-auto mb-10 w-full">
                            <div className="relative flex-1 group">
                                <div className="absolute inset-y-0 left-5 flex items-center pointer-events-none text-slate-300 group-focus-within:text-blue-500 transition-colors">
                                    <i className="fa-regular fa-id-card text-xl"></i>
                                </div>
                                <input 
                                    type="text" value={searchId} onChange={(e)=>setSearchId(e.target.value)}
                                    placeholder="ใส่รหัสพนักงาน..." 
                                    className="w-full bg-slate-50 border border-slate-100 rounded-[1.2rem] pl-14 pr-5 py-4 font-black text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-100 focus:bg-white transition-all text-lg"
                                />
                            </div>
                            <button type="submit" className="w-full sm:w-auto bg-blue-600 text-white px-10 py-4 rounded-[1.2rem] font-black hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all active:scale-95 flex items-center justify-center gap-2">
                                <i className="fa-solid fa-magnifying-glass"></i> ค้นหา
                            </button>
                        </form>

                        {searchedEmp ? (
                            <div className="space-y-6 animate-in slide-in-from-bottom-4 duration-500">
                                <div className="bg-white rounded-[2rem] border border-slate-100 p-6 sm:p-8 flex flex-col md:flex-row items-center gap-6 sm:gap-8 shadow-[0_10px_30px_-5px_rgba(0,0,0,0.03)]">
                                    <div className="relative w-24 h-24 sm:w-28 sm:h-28 flex-shrink-0 mx-auto md:mx-0">
                                        <div className="w-full h-full rounded-full shadow-inner" style={{ background: donutGradientStr }}></div>
                                        <div className="absolute inset-0 m-auto w-[70px] h-[70px] sm:w-[85px] sm:h-[85px] bg-slate-50 rounded-full flex items-center justify-center border-[3px] border-white shadow-sm text-blue-500 text-2xl sm:text-3xl">
                                            <i className="fa-solid fa-person text-blue-400"></i>
                                        </div>
                                    </div>
                                    <div className="flex-1 text-center md:text-left">
                                        <h3 className="text-[28px] sm:text-[34px] font-black text-slate-800 leading-none mb-4">{searchedEmp.name}</h3>
                                        <div className="flex flex-wrap justify-center md:justify-start gap-2.5">
                                            <span className="bg-slate-50 border border-slate-100 px-4 py-1.5 rounded-full text-[11px] font-black text-slate-400 flex items-center gap-2">
                                                <i className="fa-solid fa-hashtag text-[10px] opacity-60"></i> {searchedEmp.id}
                                            </span>
                                            <span className="bg-slate-50 border border-slate-100 px-4 py-1.5 rounded-full text-[11px] font-black text-slate-400 flex items-center gap-2">
                                                <i className="fa-solid fa-location-dot text-[10px] opacity-60"></i> {searchedEmp.line} - {searchedEmp.group}
                                            </span>
                                            <span className="bg-slate-50 border border-slate-100 px-4 py-1.5 rounded-full text-[11px] font-black text-slate-400 flex items-center gap-2">
                                                <i className="fa-solid fa-user-tie text-[10px] opacity-60"></i> {searchedEmp.role || 'Manager'}
                                            </span>
                                            {searchedEmp.resignedDate && (
                                                <span className="bg-red-50 border border-red-100 px-4 py-1.5 rounded-full text-[11px] font-black text-red-500 flex items-center gap-2">
                                                    <i className="fa-solid fa-user-xmark text-[10px]"></i> ลาออกเมื่อ {new Date(searchedEmp.resignedDate).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' })}
                                                </span>
                                            )}
                                        </div>
                                    </div>
                                    <div className="w-full md:w-auto mt-4 md:mt-0">
                                        <div className="bg-slate-50/50 p-2 rounded-2xl border border-slate-100">
                                            <label className="block text-[9px] font-black text-slate-400 uppercase tracking-widest ml-3 mb-1">เลือกรอบเงินเดือน</label>
                                            <select 
                                                value={selectedCycle} 
                                                onChange={(e)=>setSelectedCycle(e.target.value)}
                                                className="bg-white border-none text-[13px] font-black text-blue-600 outline-none pr-8 py-2.5 pl-3 rounded-xl cursor-pointer w-full shadow-sm"
                                            >
                                                {payrollCycles.map(c => <option key={c.start} value={c.start}>{c.label}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                                    <div className="bg-white border border-slate-100 p-4 sm:p-6 rounded-[2rem] text-center shadow-sm">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">มาทำงานปกติ <span className="font-bold block text-emerald-400">正常</span></p>
                                        <p className="text-3xl sm:text-4xl font-black text-emerald-500 leading-none mb-1">{getStats.normal}<span className="text-xl sm:text-3xl opacity-50">/{getStats.details.length}</span> <span className="text-xs text-slate-400">วัน</span></p>
                                    </div>
                                    <div className="bg-white border border-slate-100 p-4 sm:p-6 rounded-[2rem] text-center shadow-sm">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">มาสาย <span className="font-bold block text-orange-400">迟到</span></p>
                                        <p className="text-3xl sm:text-4xl font-black text-orange-500 leading-none mb-1">{getStats.late} <span className="text-xs text-slate-400">วัน</span></p>
                                    </div>
                                    <div className="bg-white border border-slate-100 p-4 sm:p-6 rounded-[2rem] text-center shadow-sm">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">ลาหยุด/ลากิจ/ลาป่วย <span className="font-bold block text-slate-400">请假</span></p>
                                        <p className="text-3xl sm:text-4xl font-black text-slate-300 leading-none mb-1">{getStats.leave} <span className="text-xs text-slate-400">วัน</span></p>
                                    </div>
                                    <div className="bg-white border border-slate-100 p-4 sm:p-6 rounded-[2rem] text-center shadow-sm">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">ขาดงาน <span className="font-bold block text-red-400">旷工</span></p>
                                        <p className="text-3xl sm:text-4xl font-black text-red-500 leading-none mb-1">{getStats.absent} <span className="text-xs text-slate-400">วัน</span></p>
                                    </div>
                                    <div className="col-span-2 md:col-span-1 bg-white border border-slate-100 p-4 sm:p-6 rounded-[2rem] text-center shadow-sm bg-blue-50/20 border-blue-100">
                                        <p className="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-2 italic">ชั่วโมงโอทีรวม <span className="font-bold block text-blue-400">加班</span></p>
                                        <p className="text-3xl sm:text-4xl font-black text-blue-600 leading-none mb-1">{getStats.ot.toFixed(1)} <span className="text-xs text-slate-400">ชม.</span></p>
                                    </div>
                                </div>

                                <div className="bg-white rounded-[2.5rem] border border-slate-100 overflow-hidden shadow-sm">
                                    <div className="bg-slate-50/50 px-6 sm:px-10 py-5 flex flex-col md:flex-row items-start md:items-center justify-between border-b border-slate-100 gap-4">
                                        <div>
                                            <h4 className="text-lg font-black text-slate-800">รายละเอียดการลงเวลาและโอที</h4>
                                            <div className="flex flex-wrap gap-2 sm:gap-3 mt-2">
                                                <span className="text-[11px] font-black text-slate-50 bg-white px-3 py-1 rounded-full border shadow-sm flex items-center gap-1.5">
                                                    <i className="fa-solid fa-sun text-orange-500"></i> ทำกะเช้า {getStats.dayShiftCount} วัน
                                                </span>
                                                <span className="text-[11px] font-black text-slate-500 bg-white px-3 py-1 rounded-full border shadow-sm flex items-center gap-1.5">
                                                    <i className="fa-solid fa-moon text-indigo-500"></i> ทำกะดึก {getStats.nightShiftCount} วัน
                                                </span>
                                            </div>
                                        </div>
                                        <span className="text-[11px] font-bold text-slate-400 bg-white px-4 py-1.5 rounded-full border">ทั้งหมด {getStats.details.length} วันที่มีข้อมูล</span>
                                    </div>
                                    <div className="max-h-[500px] overflow-x-auto overflow-y-auto custom-scrollbar">
                                        <table className="w-full text-left border-collapse min-w-[500px]">
                                            <thead className="bg-white sticky top-0 z-10 shadow-sm">
                                                <tr>
                                                    <th className="px-6 sm:px-10 py-4 text-[10px] font-black text-slate-300 uppercase tracking-widest border-b">วันที่ (DATE)</th>
                                                    <th className="px-6 sm:px-10 py-4 text-[10px] font-black text-slate-300 uppercase tracking-widest border-b text-center">สถานะ (STATUS)</th>
                                                    <th className="px-6 sm:px-10 py-4 text-[10px] font-black text-slate-300 uppercase tracking-widest border-b text-center">กะ (SHIFT)</th>
                                                    <th className="px-6 sm:px-10 py-4 text-[10px] font-black text-slate-300 uppercase tracking-widest border-b text-right">โอที (OT)</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {getStats.details.map((d, i) => {
                                                    const config = STATUS_LEGEND.find(l => d.status.includes(l.label));
                                                    const bgClass = config ? config.bg : 'bg-slate-200';
                                                    const textClass = config ? 'text-white' : 'text-slate-500';
                                                    
                                                    let shiftDisplay = '-';
                                                    let shiftColor = 'text-slate-400';
                                                    if (d.shift === 'Shift A') { shiftDisplay = 'DAY'; shiftColor = 'text-orange-500 font-black'; }
                                                    else if (d.shift === 'Shift B') { shiftDisplay = 'NIGHT'; shiftColor = 'text-indigo-500 font-black'; }

                                                    return (
                                                        <tr key={i} className="hover:bg-slate-50/50 transition-colors group">
                                                            <td className="px-6 sm:px-10 py-4 sm:py-5 text-[12px] sm:text-sm font-bold text-slate-600 border-b border-slate-50">
                                                                {new Date(d.date).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' })}
                                                            </td>
                                                            <td className="px-6 sm:px-10 py-4 sm:py-5 border-b border-slate-50 text-center">
                                                                <span className={`inline-block px-3 sm:px-4 py-1.5 rounded-full text-[10px] sm:text-[11px] font-black ${bgClass} ${textClass} shadow-sm`}>
                                                                    {d.status}
                                                                </span>
                                                            </td>
                                                            <td className="px-6 sm:px-10 py-4 sm:py-5 border-b border-slate-50 text-center">
                                                                <span className={`text-[11px] sm:text-[12px] ${shiftColor}`}>
                                                                    {shiftDisplay}
                                                                </span>
                                                            </td>
                                                            <td className="px-6 sm:px-10 py-4 sm:py-5 text-right font-black text-slate-300 border-b border-slate-50 group-hover:text-blue-500">
                                                                {d.ot > 0 ? <span className="text-[#ea580c] text-base sm:text-lg">{d.ot}</span> : '-'}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                                {getStats.details.length === 0 && (
                                                    <tr>
                                                        <td colSpan="4" className="px-10 py-20 text-center text-slate-300 italic font-bold">ไม่พบข้อมูลการลงเวลาในรอบนี้</td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="text-center py-20 opacity-30 italic">
                                <i className="fa-solid fa-magnifying-glass text-6xl mb-6 block text-slate-200"></i>
                                <p className="font-bold text-slate-400">กรุณากรอกรหัสพนักงานเพื่อค้นหาข้อมูล</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const LeaveStatsView = ({ employees, selectedLine, activeShift }) => {
            const STATUS_COLORS = {
                'มาปกติ': { text: 'text-emerald-500', bg: 'bg-emerald-100' },
                'สาย': { text: 'text-orange-500', bg: 'bg-orange-100' },
                'ลาป่วย': { text: 'text-slate-600', bg: 'bg-slate-200' },
                'ลากิจ': { text: 'text-fuchsia-600', bg: 'bg-fuchsia-100' },
                'ลาพักร้อน': { text: 'text-purple-600', bg: 'bg-purple-100' },
                'ลาอื่นๆ': { text: 'text-blue-600', bg: 'bg-blue-100' },
                'ขาดงาน': { text: 'text-rose-600', bg: 'bg-rose-100' },
                'ไม่มีข้อมูล': { text: 'text-slate-400', bg: 'bg-slate-50' }
            };

            const isLeave = (status) => ['ลาป่วย', 'ลากิจ', 'ลาพักร้อน', 'ลาอื่นๆ', 'ขาดงาน'].includes(status);
            
            const getShortStatus = (status) => {
                if(status.includes('ป่วย')) return 'ป่วย';
                if(status.includes('กิจ')) return 'กิจ';
                if(status.includes('พักร้อน')) return 'พักร้อน';
                if(status.includes('อื่น')) return 'อื่นๆ';
                if(status.includes('ขาด')) return 'ขาด';
                return '-';
            };

            const availableDates = useMemo(() => {
                if (!employees.length || !employees[0].statusesByDate) return [];
                return Object.keys(employees[0].statusesByDate).sort((a, b) => new Date(b) - new Date(a));
            }, [employees]);

            const [endDate, setEndDate] = useState('');
            useEffect(() => {
                if (availableDates.length > 0 && !endDate) {
                    setEndDate(availableDates[0]);
                }
            }, [availableDates]);

            const weekDates = useMemo(() => {
                if (!endDate || availableDates.length === 0) return [];
                const idx = availableDates.indexOf(endDate);
                if (idx === -1) return availableDates.slice(0, 7).reverse();
                return availableDates.slice(idx, idx + 7).reverse();
            }, [endDate, availableDates]);

            const lineStats = useMemo(() => {
                return [1, 2, 3, 4, 5, 6].map(l => {
                    let count = 0;
                    employees.forEach(emp => {
                        if (emp.isResignedFromNote || (emp.resignedDate && new Date(weekDates[0]) > new Date(emp.resignedDate))) return;
                        if (emp.shift !== activeShift) return;
                        
                        const regex = new RegExp(`(^|\\s|\\W)${l}(\\s|\\W|$)`);
                        if (!regex.test((emp.line || '').toString().toUpperCase())) return;

                        weekDates.forEach(date => {
                            if (isLeave(emp.statusesByDate?.[date])) count++;
                        });
                    });
                    return { line: `LINE ${l}`, count };
                });
            }, [employees, activeShift, weekDates]);

            const dailyStats = useMemo(() => {
                return weekDates.map(date => {
                    let count = 0;
                    employees.forEach(emp => {
                        if (emp.isResignedFromNote || (emp.resignedDate && new Date(date) > new Date(emp.resignedDate))) return;
                        if (emp.shift !== activeShift) return;
                        
                        if (selectedLine !== 'ALL') {
                            const lineNum = selectedLine.replace('LINE ', '').trim();
                            const regex = new RegExp(`(^|\\s|\\W)${lineNum}(\\s|\\W|$)`);
                            if (!regex.test((emp.line || '').toString().toUpperCase())) return;
                        }
                        if (isLeave(emp.statusesByDate?.[date])) count++;
                    });
                    return { date, displayDate: new Date(date).toLocaleDateString('th-TH', {day:'numeric', month:'short'}), count };
                });
            }, [employees, activeShift, selectedLine, weekDates]);

            const maxLeaveDay = dailyStats.reduce((max, p) => p.count > max.count ? p : max, dailyStats[0] || {count: 0});

            const tableData = useMemo(() => {
                return employees.filter(emp => {
                    if (emp.isResignedFromNote || (emp.resignedDate && new Date(weekDates[weekDates.length-1]) > new Date(emp.resignedDate))) return false;
                    if (emp.shift !== activeShift) return false;
                    
                    if (selectedLine !== 'ALL') {
                        const lineNum = selectedLine.replace('LINE ', '').trim();
                        const regex = new RegExp(`(^|\\s|\\W)${lineNum}(\\s|\\W|$)`);
                        if (!regex.test((emp.line || '').toString().toUpperCase())) return false;
                    }

                    let hasLeave = false;
                    weekDates.forEach(date => { if (isLeave(emp.statusesByDate?.[date])) hasLeave = true; });
                    return hasLeave;
                }).map(emp => {
                    let totalLeave = 0;
                    weekDates.forEach(date => { if (isLeave(emp.statusesByDate?.[date])) totalLeave++; });
                    return { ...emp, totalLeave };

            }, [employees, activeShift, selectedLine, weekDates]);

            const getDirectImageUrl = (url) => {

            const maxLineCount = Math.max(...lineStats.map(d => d.count), 1);

            return (

        };

        const KeyPositionsView = ({ employees, selectedLine, activeShift }) => {
            const [searchTerm, setSearchTerm] = useState('');
            
            const KEY_ROLES = [
                { id: 'supervisor', label: 'Supervisor', zh: '主管', sub: 'ซุปเปอร์ไวเซอร์', keywords: ['supervisor', 'ซุปเปอร์', 'sup'], color: 'bg-rose-500', text: 'text-rose-600', light: 'bg-rose-50', icon: 'fa-shield-halved' },
                { id: 'leader', label: 'Leader', zh: '组长', sub: 'หัวหน้างาน', keywords: ['leader', 'หัวหน้า', 'lead'], color: 'bg-cyan-500', text: 'text-cyan-600', light: 'bg-cyan-50', icon: 'fa-medal' },
                { id: 'welding', label: 'Welding', zh: '焊接', sub: 'งานเชื่อม', keywords: ['welding', 'weld', 'เชื่อม'], color: 'bg-orange-500', text: 'text-orange-600', light: 'bg-orange-50', icon: 'fa-fire' },
                { id: 'vacuum', label: 'Vacuum / Charging', zh: '抽真空 / 充注', sub: 'แวคคั่ม/เติมสาร', keywords: ['vacuum', 'vac', 'แวคคัม', 'แวคคั่ม', 'แวค', 'charging', 'charge', 'เติมสาร', 'ชาร์จ'], color: 'bg-blue-500', text: 'text-blue-600', light: 'bg-blue-50', icon: 'fa-gauge-high' },
                { id: 'pinch', label: 'Pinch-off', zh: '封口', sub: 'ปิดระบบ/บีบ', keywords: ['pinch', 'พินช์', 'พิน', 'ปิดระบบ', 'ปิดผนึก', 'บีบ'], color: 'bg-indigo-500', text: 'text-indigo-600', light: 'bg-indigo-50', icon: 'fa-snowflake' },
                { id: 'cooling', label: 'Cooling / Test', zh: '测试', sub: 'ทดสอบ', keywords: ['cooling', 'cool', 'ทดสอบ', 'test', 'เทส'], color: 'bg-purple-500', text: 'text-purple-600', light: 'bg-purple-50', icon: 'fa-flask-vial' },
                { id: 'screw', label: 'Screw', zh: '打螺丝', sub: 'ขันสกรู', keywords: ['screw', 'สกรู', 'ขัน'], color: 'bg-emerald-500', text: 'text-emerald-600', light: 'bg-emerald-50', icon: 'fa-screwdriver' }
            ];

            const getDirectImageUrl = (url) => {
                if (!url) return null;
                const driveMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
                if (driveMatch && driveMatch[1]) {
                    return `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w100`;
                }
                return url;
            };

            const { processedList, counts, total } = useMemo(() => {
                const uniqueEmpsMap = new Map();
                const roleCounts = { supervisor: 0, leader: 0, welding: 0, vacuum: 0, pinch: 0, cooling: 0, screw: 0 };

                employees.forEach(emp => {
                    if (emp.isResignedFromNote || (emp.resignedDate && new Date() > new Date(emp.resignedDate))) return;
                    if (emp.shift !== activeShift) return;

                    const lineNum = selectedLine.replace('LINE ', '').trim();
                    if (selectedLine !== 'ALL') {
                        const regex = new RegExp(`(^|\\s|\\W)${lineNum}(\\s|\\W|$)`);
                        if (!regex.test((emp.line || '').toString().toUpperCase())) return;
                    }

                    if (searchTerm) {
                        const term = searchTerm.toLowerCase().trim();
                        const idMatch = String(emp.id).toLowerCase().includes(term);
                        const nameMatch = String(emp.name).toLowerCase().includes(term);
                        if (!idMatch && !nameMatch) return;
                    }

                    const mainRoleStr = [emp.role, emp.group].join(' ').toLowerCase();
                    const fullRoleStr = [emp.role, emp.role2, emp.role3, emp.role4, emp.group].join(' ').toLowerCase();
                    
                    let primaryCat = null;
                    let matchedCats = [];

                    for (const cat of KEY_ROLES) {
                        if (cat.keywords.some(kw => mainRoleStr.includes(kw.toLowerCase()))) {
                            primaryCat = cat;
                            break;
                        }
                    }

                    for (const cat of KEY_ROLES) {
                        if (cat.keywords.some(kw => fullRoleStr.includes(kw.toLowerCase()))) {
                            matchedCats.push(cat);
                        }
                    }

                    if (!primaryCat && matchedCats.length > 0) {
                        primaryCat = matchedCats[0];
                    }

                    if (primaryCat && matchedCats.length > 0) {
                        roleCounts[primaryCat.id]++;
                        uniqueEmpsMap.set(emp.id, { ...emp, category: primaryCat, allCategories: matchedCats });
                    }
                });

                const list = Array.from(uniqueEmpsMap.values());
                list.sort((a, b) => {
                    if (a.line === b.line) return a.category.id.localeCompare(b.category.id);
                    return a.line.localeCompare(b.line);
                });

                return { processedList: list, counts: roleCounts, total: list.length };
            }, [employees, activeShift, selectedLine, searchTerm]);

            const handleExportCSV = () => {
                const headers = ['รหัส', 'ชื่อ-นามสกุล', 'ไลน์', 'กลุ่ม', 'ตำแหน่งหลัก', 'ตำแหน่งเสริม 1 (Role2)', 'ตำแหน่งเสริม 2 (Role3)', 'ตำแหน่งเสริม 3 (Role4)', 'สังกัด', 'ทักษะสำคัญที่ระบบตรวจพบ'];
                const rows = processedList.map(e => [
                    `"${e.id}"`, 
                    `"${e.name}"`, 
                    `"${e.line}"`, 
                    `"${e.group}"`, 
                    `"${e.role}"`, 
                    `"${e.role2 || ''}"`, 
                    `"${e.role3 || ''}"`, 
                    `"${e.role4 || ''}"`, 
                    `"${e.contract}"`,
                    `"${e.allCategories?.map(c => c.label).join(', ') || ''}"`
                ]);
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + 
                    [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
                
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `haier_key_positions_${activeShift}_${selectedLine}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
