<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบบันทึกเวลาเข้างาน</title>
  <!-- ใช้ Relative Path รองรับ GitHub Pages -->
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="./js/api-config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    body::before { top: -50px; left: -50px; width: 300px; height: 300px; background: #6366f1; }
    body::after { bottom: -50px; right: -50px; width: 300px; height: 300px; background: #10b981; }

    .header { text-align: center; margin-bottom: 40px; position: relative; z-index: 1; }
    .logo-icon { font-size: 48px; margin-bottom: 10px; display: inline-block; }
    h1 { font-size: 1.8em; font-weight: 700; margin-bottom: 5px; color: #f1f5f9; }
    .subtitle { color: #94a3b8; font-size: 0.9em; }

    .api-warning {
      background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5; padding: 10px 20px; border-radius: 12px;
      margin-bottom: 24px; font-size: 0.85em; display: none; z-index: 1; position: relative;
    }
    .api-warning a { color: #fbbf24; text-decoration: underline; margin-left: 5px; }

    .menu-cards {
      display: flex; flex-direction: column; gap: 16px; max-width: 350px; width: 100%; position: relative; z-index: 1;
    }

    .btn-menu {
      display: flex; align-items: center; padding: 20px;
      background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px; text-decoration: none; color: #e2e8f0;
      transition: all 0.3s ease; backdrop-filter: blur(10px);
    }
    .btn-menu:hover { transform: translateY(-3px); background: rgba(255, 255, 255, 0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

    .card-icon {
      width: 50px; height: 50px; border-radius: 16px;
      display: flex; justify-content: center; align-items: center;
      font-size: 24px; margin-right: 16px; flex-shrink: 0;
    }
    .btn-register .card-icon { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
    .btn-scan .card-icon { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    .btn-config .card-icon { background: rgba(148, 163, 184, 0.2); color: #cbd5e1; }
    .btn-dashboard .card-icon { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }

    .card-text { flex-grow: 1; }
    .card-title { font-size: 1.1em; font-weight: 600; margin-bottom: 4px; }
    .card-desc { font-size: 0.8em; color: #94a3b8; }
    .card-arrow { font-size: 1.5em; color: #475569; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="header">
    <span class="logo-icon">🏢</span>
    <h1>ระบบบันทึกเวลาเข้างาน</h1>
    <p class="subtitle">Face Recognition &amp; GPS Attendance</p>
  </div>

  <div id="apiWarning" class="api-warning">
    ⚠️ ยังไม่ได้ตั้งค่า API —
    <a href="./config.html">ไปตั้งค่าก่อน</a>
  </div>

  <div class="menu-cards">
    <a href="./register.html" class="btn-menu btn-register">
      <div class="card-icon">👤</div>
      <div class="card-text">
        <div class="card-title">ลงทะเบียนพนักงาน</div>
        <div class="card-desc">บันทึกข้อมูลใบหน้าใหม่</div>
      </div>
      <span class="card-arrow">›</span>
    </a>

    <a href="./scan.html" class="btn-menu btn-scan">
      <div class="card-icon">📷</div>
      <div class="card-text">
        <div class="card-title">สแกนเข้างาน</div>
        <div class="card-desc">ยืนยันตัวตนด้วยใบหน้า + GPS</div>
      </div>
      <span class="card-arrow">›</span>
    </a>

    <a href="./config.html" class="btn-menu btn-config">
      <div class="card-icon">⚙️</div>
      <div class="card-text">
        <div class="card-title">ตั้งค่าระบบ</div>
        <div class="card-desc">จัดการ GPS และ API (Admin)</div>
      </div>
      <span class="card-arrow">›</span>
    </a>

    <!-- เพิ่มปุ่มลัดเข้า Dashboard ไว้ในเมนูให้ด้วยเลย -->
    <a href="./dashboard.html" class="btn-menu btn-dashboard">
      <div class="card-icon">📊</div>
      <div class="card-text">
        <div class="card-title">แดชบอร์ด & OT</div>
        <div class="card-desc">ดูข้อมูลภาพรวมสรุปผล</div>
      </div>
      <span class="card-arrow">›</span>
    </a>
  </div>

  <script>
    const savedUrl = localStorage.getItem('gasApiUrl') || (typeof GAS_API_URL !== 'undefined' ? GAS_API_URL : '');
    if (!savedUrl || savedUrl.trim() === '') {
      document.getElementById('apiWarning').style.display = 'block';
    }
  </script>
</body>
</html>
